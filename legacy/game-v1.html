<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Kestrel Run</title>
<style>
:root{
  --bg:#0a0c12; --panel:#12141c; --panel2:#181b26; --line:#2a2e3d;
  --txt:#c9cdd8; --dim:#7d8294; --amber:#e8b04b; --green:#6fbf73; --red:#d96b6b; --blue:#5b8dd9;
}
*{box-sizing:border-box; margin:0; padding:0;}
body{
  background:var(--bg); color:var(--txt);
  font-family:"Segoe UI", system-ui, sans-serif; font-size:14px;
  background-image:
    radial-gradient(1px 1px at 20% 30%, #fff8 0%, transparent 100%),
    radial-gradient(1px 1px at 40% 70%, #fff5 0%, transparent 100%),
    radial-gradient(1px 1px at 60% 20%, #fff6 0%, transparent 100%),
    radial-gradient(1px 1px at 80% 50%, #fff4 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 80%, #fff7 0%, transparent 100%),
    radial-gradient(1px 1px at 10% 85%, #fff5 0%, transparent 100%),
    radial-gradient(1px 1px at 33% 12%, #fff6 0%, transparent 100%),
    radial-gradient(1px 1px at 72% 92%, #fff5 0%, transparent 100%);
  min-height:100vh;
}
#topbar{
  display:flex; flex-wrap:wrap; gap:14px; align-items:center;
  background:var(--panel); border-bottom:1px solid var(--line);
  padding:8px 14px; position:sticky; top:0; z-index:5;
}
#topbar .ship-name{color:var(--amber); font-weight:600; letter-spacing:1px;}
#topbar .stat{white-space:nowrap;}
#topbar .stat b{color:#fff; font-weight:600;}
.low{color:var(--red) !important;}
#nav{display:flex; gap:6px; padding:8px 14px; background:#0e1018; border-bottom:1px solid var(--line); flex-wrap:wrap;}
#nav button{margin-right:2px;}
#nav .right{margin-left:auto; display:flex; gap:6px;}
#wrap{display:flex; gap:12px; padding:12px 14px; align-items:flex-start; max-width:1280px; margin:0 auto;}
#main{flex:1; min-width:0;}
#side{width:270px; flex-shrink:0;}
button{
  background:var(--panel2); color:var(--txt); border:1px solid var(--line);
  padding:6px 12px; border-radius:4px; cursor:pointer; font-family:inherit; font-size:13px;
}
button:hover:not(:disabled){border-color:var(--amber); color:var(--amber);}
button:disabled{opacity:.4; cursor:not-allowed;}
button.primary{background:#3a2f14; border-color:var(--amber); color:var(--amber); font-weight:600;}
button.danger{border-color:var(--red); color:var(--red);}
button.tab-on{background:#3a2f14; border-color:var(--amber); color:var(--amber);}
.panel{background:var(--panel); border:1px solid var(--line); border-radius:6px; padding:12px; margin-bottom:12px;}
.panel h3{color:var(--amber); font-size:13px; text-transform:uppercase; letter-spacing:2px; margin-bottom:10px; border-bottom:1px solid var(--line); padding-bottom:6px;}
.card{background:var(--panel2); border:1px solid var(--line); border-radius:5px; padding:10px; margin-bottom:8px;}
.card .title{font-weight:600; color:#fff; margin-bottom:3px;}
.card .pay{color:var(--green); font-weight:600;}
.dim{color:var(--dim); font-size:12px;}
.badge{display:inline-block; font-size:11px; padding:1px 7px; border-radius:10px; border:1px solid var(--line); margin-right:4px; margin-top:3px;}
.badge.ok{border-color:var(--green); color:var(--green);}
.badge.no{border-color:var(--red); color:var(--red);}
.badge.fac{border-color:var(--blue); color:var(--blue);}
.row{display:flex; gap:12px; flex-wrap:wrap;}
.col{flex:1; min-width:280px;}
table{width:100%; border-collapse:collapse;}
td,th{padding:5px 8px; text-align:left; border-bottom:1px solid var(--line); font-size:13px;}
th{color:var(--dim); font-weight:500; text-transform:uppercase; font-size:11px; letter-spacing:1px;}
/* ship visual */
.shipvis{width:320px; margin:0 auto; filter:drop-shadow(0 8px 20px #000c);}
.nose{
  height:78px; background:linear-gradient(180deg,#2b3145,#1a1e2c);
  clip-path:polygon(50% 0, 86% 74%, 92% 100%, 8% 100%, 14% 74%);
  position:relative; display:flex; align-items:flex-end; justify-content:center;
  padding-bottom:5px; color:var(--amber); font-size:10px; letter-spacing:2px;
}
.canopy{
  position:absolute; top:16px; left:50%; transform:translateX(-50%);
  width:34px; height:24px; border-radius:50% 50% 42% 42%;
  background:radial-gradient(ellipse at 50% 25%, #9fd8ff55, #14304e);
  border:1px solid #3d4a66; box-shadow:0 0 10px #5b8dd955;
}
.hullbody{
  background:linear-gradient(90deg,#10131d 0%,#181c2a 12%,#1b2030 50%,#181c2a 88%,#10131d 100%);
  border-left:4px solid #2e3448; border-right:4px solid #2e3448; padding:9px 10px; position:relative;
}
.hullbody::before, .hullbody::after{
  content:""; position:absolute; top:28%; width:16px; height:44%; background:#232838;
}
.hullbody::before{left:-20px; clip-path:polygon(100% 0,100% 100%,0 76%,0 24%);}
.hullbody::after{right:-20px; clip-path:polygon(0 0,0 100%,100% 76%,100% 24%);}
.slotgrid{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
.slot{
  min-height:68px; border:1px solid #262b3c; border-radius:6px; position:relative;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
  cursor:pointer; font-size:11.5px; text-align:center; padding:8px 4px;
  background:linear-gradient(180deg,#161a28,#10131d);
  box-shadow:inset 0 1px 0 #ffffff0a, inset 0 -5px 9px #0007;
}
.slot:hover{border-color:var(--amber);}
.slot.filled{border-color:#3d4358; background:linear-gradient(180deg,#1e2334,#171b29);}
.slot.offline{opacity:.6;}
.slot.dmgd{border-color:var(--red); background:linear-gradient(180deg,#2a1518,#170f12);}
.slot.locked{opacity:.4; cursor:default; border-style:dotted; background:#0c0e15;}
.slot.selected{border-color:var(--amber); box-shadow:0 0 10px #e8b04b44, inset 0 0 12px #e8b04b1e;}
.slot .ic{font-size:20px; line-height:1;}
.led{position:absolute; top:5px; right:6px; width:7px; height:7px; border-radius:50%;}
.led.g{background:#6fbf73; box-shadow:0 0 6px #6fbf73; animation:pulse 2.6s infinite;}
.led.o{background:#5a5f72;}
.led.r{background:var(--red); box-shadow:0 0 7px var(--red); animation:alarm .7s infinite;}
.pips{position:absolute; top:3px; left:5px; font-size:9px; color:#e8b04baa;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes alarm{0%,100%{opacity:1}50%{opacity:.15}}
.tail{
  height:54px; background:linear-gradient(0deg,#2b3145,#1a1e2c);
  clip-path:polygon(6% 0, 94% 0, 80% 100%, 20% 100%);
  display:flex; align-items:flex-start; justify-content:center; padding-top:6px;
  color:var(--amber); font-size:10px; letter-spacing:2px;
}
.flames{display:flex; justify-content:center; gap:30px; margin-top:-1px;}
.flame{
  width:13px; height:26px; border-radius:0 0 9px 9px;
  background:linear-gradient(180deg,#fff0c0,#e8b04b 30%,#d9612b 65%,transparent);
  transform-origin:top; animation:flick .22s infinite alternate; filter:blur(.6px);
}
.flame:nth-child(2){animation-delay:.09s;}
.flame:nth-child(3){animation-delay:.16s;}
@keyframes flick{from{transform:scaleY(.8); opacity:.75} to{transform:scaleY(1.3); opacity:1}}
.powerbar{margin-top:12px;}
.powerbar .cells{display:flex; gap:3px; margin-top:5px;}
.powerbar .cell{flex:1; height:11px; border-radius:2px; background:#1c2133; border:1px solid #2c3350;}
.powerbar .cell.used{background:linear-gradient(180deg,#ffd77a,#b97e1f); border-color:#e8b04b; box-shadow:0 0 4px #e8b04b55;}
/* travel starfield */
.starfield{position:relative; height:120px; border:1px solid var(--line); border-radius:6px; overflow:hidden; margin:12px 0; background:#04050a;}
.starfield .l1,.starfield .l2{position:absolute; inset:0; background-repeat:repeat;}
.starfield .l1{
  background-image:radial-gradient(1px 1px at 10px 20px,#fff9,transparent),radial-gradient(1px 1px at 60px 84px,#fff5,transparent),radial-gradient(1.6px 1.6px at 132px 42px,#fffb,transparent),radial-gradient(1px 1px at 190px 100px,#fff6,transparent),radial-gradient(1.2px 1.2px at 226px 66px,#fff8,transparent);
  background-size:260px 120px; animation:scroll1 3s linear infinite;
}
.starfield .l2{
  background-image:radial-gradient(1px 1px at 32px 62px,#fff4,transparent),radial-gradient(1px 1px at 92px 16px,#fff3,transparent),radial-gradient(1px 1px at 158px 74px,#fff4,transparent),radial-gradient(1px 1px at 204px 34px,#fff3,transparent);
  background-size:230px 120px; animation:scroll2 7s linear infinite;
}
@keyframes scroll1{from{background-position:0 0} to{background-position:-260px 0}}
@keyframes scroll2{from{background-position:0 0} to{background-position:-230px 0}}
.tinyship{position:absolute; left:34%; top:50%; transform:translate(-50%,-50%) rotate(45deg); font-size:28px; filter:drop-shadow(0 0 8px #e8b04b99);}
.tinyship::after{content:""; position:absolute; top:100%; left:50%; transform:translateX(-50%); width:3px; height:22px;
  background:linear-gradient(180deg,#e8b04bcc,transparent); border-radius:2px;}
/* map */
#mapsvg{width:100%; height:auto; background:#080a10; border:1px solid var(--line); border-radius:6px; display:block;}
.planet-dot{cursor:pointer;}
/* travel */
.progress{height:16px; background:#0d0f17; border:1px solid var(--line); border-radius:8px; overflow:hidden; margin:10px 0;}
.progress .fill{height:100%; background:linear-gradient(90deg,#7a5c1e,var(--amber)); transition:width .3s;}
/* log */
#side .logline{font-size:12px; padding:4px 2px; border-bottom:1px solid #1c1f2b; color:var(--dim);}
#side .logline b{color:var(--amber); font-weight:600;}
/* modal */
#overlay{
  position:fixed; inset:0; background:#000a; display:none; z-index:50;
  align-items:center; justify-content:center; padding:20px;
}
#overlay.show{display:flex;}
#modal{
  background:var(--panel); border:1px solid var(--amber); border-radius:8px;
  max-width:560px; width:100%; padding:20px; max-height:88vh; overflow-y:auto;
  box-shadow:0 0 40px #000;
}
#modal h2{color:var(--amber); margin-bottom:10px; font-size:18px; letter-spacing:1px;}
#modal p{margin-bottom:10px; line-height:1.55;}
#modal .choices{display:flex; flex-direction:column; gap:8px; margin-top:14px;}
#modal .choices button{text-align:left; padding:10px 12px;}
.clog{background:#0d0f17; border:1px solid var(--line); border-radius:5px; padding:8px; margin:10px 0; max-height:150px; overflow-y:auto; font-size:12px;}
.clog div{padding:2px 0;}
.hpbar{height:10px; background:#0d0f17; border:1px solid var(--line); border-radius:5px; overflow:hidden; margin:4px 0 10px;}
.hpbar .f{height:100%;}
.repbar{height:8px; background:#0d0f17; border-radius:4px; overflow:hidden; position:relative; margin:3px 0 8px;}
.repbar .f{height:100%; position:absolute; top:0;}
.statgrid{display:grid; grid-template-columns:1fr 1fr; gap:4px 12px; font-size:13px;}
.statgrid b{color:#fff;}
@media (max-width:900px){ #wrap{flex-direction:column;} #side{width:100%;} }
</style>
</head>
<body>
<div id="topbar"></div>
<div id="nav"></div>
<div id="wrap">
  <div id="main"></div>
  <div id="side"></div>
</div>
<div id="overlay"><div id="modal"></div></div>

<script>
"use strict";
/* ============================================================
   THE KESTREL RUN — a tramp-freighter captain sim
   ============================================================ */

// ---------- utils ----------
const $ = id => document.getElementById(id);
const ri = (a,b) => a + Math.floor(Math.random()*(b-a+1));
const pick = arr => arr[Math.floor(Math.random()*arr.length)];
const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
const fmt = n => Math.round(n).toLocaleString();

// ---------- static data ----------
// pw = reactor power drawn while online (0/absent = passive structure, always works unless damaged)
// gen = reactor power generated
const MODS = {
  cockpit:  {n:"Cockpit",          price:0,   core:true, icon:"🧭", d:"The captain's chair. Where the bad decisions get made."},
  engine:   {n:"Drive Core",       price:0,   core:true, icon:"🔥", d:"Propulsion and main power. Upgrades add speed AND +2 reactor output."},
  fueltank: {n:"Fuel Tank",        price:250, icon:"⛽", fuel:40,  d:"+40 fuel capacity. Passive — no power draw."},
  cargohold:{n:"Cargo Hold",       price:300, icon:"📦", cargo:20, d:"+20 cargo space. Freight pays the bills. Passive."},
  cabin:    {n:"Passenger Cabin",  price:400, icon:"🛏️", pax:2,    d:"Berths for 2 paying passengers. Passive."},
  quarters: {n:"Crew Quarters",    price:350, icon:"👥", crew:2,   d:"Bunks for 2 crew members. Passive."},
  hydro:    {n:"Hydroponics Bay",  price:500, icon:"🌱", food:2, pw:2, d:"Grows 2 food per day while powered. Beans, mostly."},
  medbay:   {n:"Med Bay",          price:550, icon:"💉", pw:2,     d:"Treats the sick, unlocks medical contracts. Needs power to run."},
  weapons:  {n:"Weapons Bay",      price:600, icon:"🎯", dmg:8, pw:2, d:"+8 combat damage while powered. Stackable."},
  shields:  {n:"Shield Generator", price:650, icon:"🛡️", shield:4, pw:2, d:"-4 damage per enemy hit while powered. Stackable."},
  armory:   {n:"Armory",           price:450, icon:"🔫",           d:"Arms the crew. Unlocks bounty contracts. Passive."},
  workshop: {n:"Workshop",         price:400, icon:"🔧", pw:1,     d:"Powered workbench: mechanic repairs 6 hull/day in flight (3 without) and fixes broken modules faster."},
  smuggler: {n:"Smuggler's Hold",  price:700, icon:"🕳️", scargo:10,d:"10 units of hidden cargo. Unlocks smuggling runs. Patrols may scan you. Passive — that's the point."},
  luxcabin: {n:"Stateroom",        price:800, icon:"🥂", vip:1, pw:1, d:"One luxury berth. Unlocks VIP charters. Cut its power and your VIP will itemize their displeasure."},
  reactor:  {n:"Auxiliary Reactor",price:550, icon:"⚛️", gen:3,    d:"+3 reactor power. The drive core alone can only feed so many systems."},
};

const FACS = {
  union:    {n:"Terran Union",       c:"#5b8dd9"},
  frontier: {n:"Frontier Compact",   c:"#d9a55b"},
  syndicate:{n:"Red Sky Syndicate",  c:"#d96b6b"},
  none:     {n:"Unaligned",          c:"#888888"},
};

const PLANETS = {
  meridian: {n:"Meridian Prime", x:140, y:110, fac:"union",    fuelP:6, foodP:3, tag:"Core world",
             goods:{ore:1.4, med:0.8, lux:0.7},
             d:"Glass towers and Union flags. Everything is clean, taxed, and watched."},
  foundry:  {n:"Foundry",        x:330, y:120, fac:"union",    fuelP:4, foodP:3, tag:"Industrial world", yard:0.85,
             goods:{ore:0.7, med:1.1, lux:1.2},
             d:"Smoke-stained orbital docks. Cheapest shipyard in the sector — modules 15% off."},
  solace:   {n:"Port Solace",    x:250, y:270, fac:"union",    fuelP:5, foodP:2, tag:"Trade hub",
             goods:{ore:1.0, med:1.0, lux:1.0},
             d:"A crossroads station. Everyone passes through Solace eventually, most owing money."},
  kestrel:  {n:"Kestrel's Rest", x:430, y:330, fac:"frontier", fuelP:5, foodP:1, tag:"Agri world",
             goods:{ore:1.1, med:1.3, lux:1.4},
             d:"Wheat to the horizon and food cheaper than dirt. Folk here don't love the Union."},
  havens:   {n:"Haven's Folly",  x:540, y:170, fac:"syndicate",fuelP:7, foodP:3, tag:"Free port",
             goods:{ore:1.2, med:1.4, lux:1.1},
             d:"No customs, no questions, no refunds. The Red Sky Syndicate keeps the peace, loosely."},
  verge:    {n:"Verge Station",  x:640, y:320, fac:"frontier", fuelP:8, foodP:4, tag:"Edge of the map",
             goods:{ore:1.3, med:1.5, lux:1.5},
             d:"Last light before the black. Prices are ugly but so is the alternative."},
  gate:     {n:"Elysium Gate",   x:770, y:420, fac:"none",     fuelP:0, foodP:0, tag:"???", hidden:true,
             goods:{ore:1.0, med:1.0, lux:1.0},
             d:"A dead moon that isn't dead. Coordinates that don't appear on any Union chart."},
};

const GOODS = {ore:{n:"Ore", base:18}, med:{n:"Medicine", base:40}, lux:{n:"Luxuries", base:65}};

const ROLES = {
  pilot:        {n:"Pilot",         d:"-15% fuel burn, +25% flee chance, dodges hazards."},
  mechanic:     {n:"Mechanic",      d:"Auto-repairs 3 hull/day in flight (6 with Workshop). Halves breakdown damage."},
  medic:        {n:"Medic",         d:"Keeps the sick alive. With a Med Bay, cures passengers fully."},
  gunner:       {n:"Gunner",        d:"+50% weapon damage in combat."},
  cook:         {n:"Cook",          d:"-25% food consumption. Morale you can taste."},
  quartermaster:{n:"Quartermaster", d:"+15% contract payouts, bribes cost 35% less."},
};

const FIRST = ["Jax","Mira","Dex","Rosa","Eli","Nadia","Cole","Yuki","Bram","Tessa","Ivan","Lupe","Kesh","Aria","Milo","June","Otto","Sana"];
const LAST  = ["Vega","Okafor","Reyes","Stone","Kwan","Marsh","Ito","Barlow","Cruz","Dane","Sok","Petrov","Hale","Iqbal","Moreau"];

const MOTIVES = {
  fugitive: {hint:"keeps glancing at the door",       d:"Wanted by somebody. Patrols may cause trouble."},
  merchant: {hint:"travels with locked sample cases", d:"May offer to buy your goods mid-flight at a premium."},
  spy:      {hint:"asks a lot of casual questions",   d:"Delivering them will shift faction politics — somehow."},
  pilgrim:  {hint:"hums quietly and tips in blessings",d:"Easy passenger. Word of your kindness spreads (+prestige)."},
  drifter:  {hint:"owns exactly one duffel bag",      d:"Just needs to be somewhere else. Don't we all."},
};

const QUIET = [
  "The black is quiet today. The hull ticks as it warms in a distant sun.",
  "Someone left the galley radio on an old frontier station. Nobody turns it off.",
  "You catch yourself talking to the ship again. She doesn't answer. Probably for the best.",
  "A Union news relay drones about tariffs. You change the channel.",
  "The stars don't care about your fuel gauge. Somehow that's comforting.",
  "You find an old coin from Meridian under the pilot seat. Heads. Good omen.",
];

const RUMORS = [
  "\"Foundry's yard runs 15% off list price. Bring your own welder though.\"",
  "\"Food's nearly free on Kestrel's Rest. Buy there, sell to the Verge — folk out there eat money.\"",
  "\"Medicine bought cheap on Meridian sells triple out past the frontier.\"",
  "\"Pirates work the long empty runs. Weapons bay ain't optional forever, captain.\"",
  "\"Union patrols scan for smuggler holds. A good bribe is cheaper than a fine.\"",
  "\"Hire a mechanic before you need one. Ships break in the middle of nowhere, that's the rule.\"",
  "\"The Syndicate pays well and remembers favors. The Union pays on time and remembers everything.\"",
  "\"A stateroom pays for itself in two VIP charters, if you can stomach the clientele.\"",
];

// ---------- state ----------
let S = null;
let MODAL_HTML = null;
let C = null; // combat state

function newState(shipName){
  return {
    shipName: shipName || "Kestrel",
    day:1, credits:500, fuel:30, food:20, hull:100, hullMax:100, prestige:0,
    engineLvl:1, slotsMax:6, loc:"solace", docked:true,
    screen:"ship", ptab:"cantina", sel:null, selPlanet:null,
    rep:{union:0, frontier:0, syndicate:0},
    modules:[mk("cockpit"), mk("engine"), mk("fueltank"), mk("cargohold")],
    cargo:{ore:0, med:0, lux:0},
    crew:[], jobs:[], logLines:[],
    market:null, travel:null,
    arc:{stage:0, deadline:null, betrayed:false, ambushed:false, done:false},
    starve:0, unpaid:0, uid:1, over:false, won:false, dead:false,
  };
}

// ---------- modules & derived stats ----------
// Each installed module is an instance: {t:type, on:bool, dmg:bool}.
// Passive modules (no pw) work unless damaged; powered modules must also be online.
function mk(t){ return {t:t, on:true, dmg:false}; }
function modInst(){ return S.modules.filter(m => !MODS[m.t].core); }
function stats(){
  const inst   = t => S.modules.filter(m => m.t===t).length;
  const intact = t => S.modules.filter(m => m.t===t && !m.dmg).length;
  const active = t => S.modules.filter(m => m.t===t && !m.dmg && (MODS[m.t].pw ? m.on : true)).length;
  const has = r => S.crew.some(c => c.role===r);
  const powerOut = 4 + 2*S.engineLvl + intact("reactor")*3;
  const powerUse = S.modules.reduce((a,m)=> a + ((MODS[m.t].pw && m.on && !m.dmg) ? MODS[m.t].pw : 0), 0);
  const wDmg = active("weapons")*8;
  return {
    inst, intact, active, has, powerOut, powerUse,
    fuelCap: intact("fueltank")*40,
    cargoCap: intact("cargohold")*20,
    scargoCap: intact("smuggler")*10,
    paxCap: intact("cabin")*2,
    vipCap: intact("luxcabin"),
    crewCap: intact("quarters")*2,
    dmg: Math.round((wDmg>0 ? wDmg : 2) * (has("gunner") ? 1.5 : 1)),
    shield: active("shields")*4,
    foodGen: active("hydro")*2,
    speed: [0,70,85,100][S.engineLvl],
    fuelDay: +(4*(has("pilot") ? 0.85 : 1)).toFixed(1),
  };
}
function powerRebalance(){
  let guard = 24;
  while(guard-- > 0){
    const st = stats();
    if(st.powerUse <= st.powerOut) break;
    const cands = S.modules.filter(m => MODS[m.t].pw && m.on && !m.dmg);
    if(!cands.length) break;
    const m = cands[cands.length-1];
    m.on = false;
    log(`⚡ Brownout — not enough reactor output. ${MODS[m.t].n} powered down automatically.`);
  }
}
function toggleMod(i){
  const m = modInst()[i];
  if(!m || !MODS[m.t].pw) return;
  if(m.dmg){ log(MODS[m.t].n+" is damaged — it needs repairs, not a power switch."); render(); return; }
  if(!m.on){
    const st = stats();
    if(st.powerUse + MODS[m.t].pw > st.powerOut){
      log("⚡ Not enough reactor output. Power something down, upgrade the drive core, or fit an Auxiliary Reactor.");
      render(); return;
    }
    m.on = true;
    log(MODS[m.t].n+" powered up. The deck plating hums a little louder.");
  } else {
    m.on = false;
    log(MODS[m.t].n+" powered down. One less light in the black.");
  }
  render();
}
const DMG_FLAVOR = {
  fueltank:"Fuel sprays into the void before the feed lines seal.",
  cargohold:"Decompression in the hold — cargo netting snaps like thread.",
  cabin:"The passenger cabin vents atmosphere; everyone crowds into the corridor.",
  quarters:"The crew bunks are scrap metal and floating bedding.",
  hydro:"The hydroponics bay is a blizzard of frozen bean plants.",
  medbay:"The auto-doc sparks, dispenses one final bandage, and dies.",
  weapons:"The weapons bay capacitors blow in a shower of sparks.",
  shields:"The shield emitters overload and go dark.",
  armory:"The armory rack tears loose. There are rifles in the vents now.",
  workshop:"Half the workshop's tools are orbiting debris.",
  smuggler:"The hidden hold's false floor buckles. It is neither hidden nor a floor.",
  luxcabin:"The stateroom's chandelier is — was — very expensive.",
  reactor:"The auxiliary reactor SCRAMs hard. Emergency lighting only.",
};
function damageModule(cause){
  const cands = S.modules.filter(m => !MODS[m.t].core && !m.dmg);
  if(!cands.length) return false;
  const m = pick(cands);
  m.dmg = true;
  log(`🔧 ${cause||"Malfunction"}: ${MODS[m.t].n} OFFLINE — ${DMG_FLAVOR[m.t]||"Something important breaks."}`);
  // knock-on effects of losing the module
  const st = stats();
  if(S.fuel > st.fuelCap){
    log(`Lost ${Math.round(S.fuel - st.fuelCap)} fuel with the tank.`);
    S.fuel = st.fuelCap;
  }
  let over = cargoUsed() - st.cargoCap;
  if(over > 0){
    for(const g of ["ore","med","lux"]){
      const d = Math.min(over, S.cargo[g]);
      if(d>0){ S.cargo[g]-=d; over-=d; log(`Jettisoned ${d} ${GOODS[g].n} from the breached hold.`); }
      if(over<=0) break;
    }
  }
  if(paxJobs().length > st.paxCap){
    const j = paxJobs().find(x => !x.pax.sick);
    if(j){ j.pax.sick = true; log(`${j.pax.name} is now sleeping on crates and will absolutely not be paying full fare.`); }
  }
  powerRebalance();
  return true;
}
function repairSystems(){
  const dmgd = S.modules.filter(m => m.dmg);
  if(!dmgd.length) return;
  const cost = dmgd.length*80;
  if(S.credits < cost){ log("Not enough credits for system repairs."); render(); return; }
  S.credits -= cost;
  dmgd.forEach(m => { m.dmg = false; m.on = true; });
  powerRebalance();
  log(`Yard techs bring ${dmgd.length} system${dmgd.length>1?"s":""} back online (−${cost}cr).`);
  render();
}
function paxJobs(){ return S.jobs.filter(j => j.pax && !j.vip); }
function vipJobs(){ return S.jobs.filter(j => j.pax && j.vip); }
function people(){ return 1 + S.crew.length + S.jobs.filter(j=>j.pax).length; }
function foodPerDay(){
  const raw = people() * (stats().has("cook") ? 0.75 : 1);
  return Math.ceil(raw);
}
function cargoUsed(){
  return S.cargo.ore + S.cargo.med + S.cargo.lux +
    S.jobs.filter(j => j.units && !j.hidden).reduce((a,j)=>a+j.units,0);
}
function scargoUsed(){ return S.jobs.filter(j => j.units && j.hidden).reduce((a,j)=>a+j.units,0); }
function salaries(){ return S.crew.reduce((a,c)=>a+c.salary,0); }
function dist(a,b){ const A=PLANETS[a], B=PLANETS[b]; return Math.hypot(A.x-B.x, A.y-B.y); }
function daysTo(from,to){ return Math.max(1, Math.ceil(dist(from,to)/stats().speed)); }
function fuelTo(from,to){ return Math.ceil(daysTo(from,to)*stats().fuelDay); }

// ---------- log / save ----------
function log(msg){
  S.logLines.unshift({d:S.day, m:msg});
  if(S.logLines.length>60) S.logLines.pop();
}
function save(){ try{ if(!S.over) localStorage.setItem("kestrelrun", JSON.stringify(S)); }catch(e){} }

// ---------- modal ----------
function modal(html){ MODAL_HTML = html; drawModal(); }
function closeModal(){ MODAL_HTML = null; drawModal(); render(); }
function drawModal(){
  const ov = $("overlay");
  if(MODAL_HTML){ ov.classList.add("show"); $("modal").innerHTML = MODAL_HTML; }
  else ov.classList.remove("show");
}

// ============================================================
// MARKET / MISSION GENERATION
// ============================================================
function refreshMarket(){
  if(S.market && S.market.loc===S.loc && S.market.day===S.day) return;
  const p = PLANETS[S.loc];
  if(S.loc==="gate"){ S.market={loc:S.loc, day:S.day, missions:[], recruits:[], prices:{}, rumors:[]}; return; }
  const prices = {};
  for(const g in GOODS){
    prices[g] = Math.round(GOODS[g].base * p.goods[g] * (0.9 + Math.random()*0.25));
  }
  const missions = [];
  const n = ri(3,5);
  for(let i=0;i<n;i++){ const m = genMission(); if(m) missions.push(m); }
  const recruits = [];
  const rn = ri(0,2);
  for(let i=0;i<rn;i++) recruits.push(genRecruit());
  const rumors = [];
  const pool = RUMORS.slice();
  for(let i=0;i<2;i++) rumors.push(pool.splice(Math.floor(Math.random()*pool.length),1)[0]);
  S.market = {loc:S.loc, day:S.day, missions, recruits, prices, rumors};
}

function otherPlanet(){
  const opts = Object.keys(PLANETS).filter(k => k!==S.loc && !PLANETS[k].hidden);
  return pick(opts);
}

function genMission(){
  const p = PLANETS[S.loc];
  const roll = Math.random();
  const dest = otherPlanet();
  const dd = daysTo(S.loc, dest);
  const id = S.uid++;
  if(roll < 0.30){ // cargo
    const units = ri(6,16);
    const goodsNames = ["machine parts","grain sacks","water recyclers","spare hull plating","comm relays","mining charges","textiles","vaccine crates"];
    return {id, kind:"cargo", title:"Freight: "+pick(goodsNames), dest, units,
      pay: units*ri(6,10) + dd*30, prestige:1, rep:[p.fac,1],
      needs:["cargo:"+units],
      desc:`Haul ${units} units to ${PLANETS[dest].n}. ${dd} day run.`};
  } else if(roll < 0.55){ // passenger
    const motive = pick(Object.keys(MOTIVES));
    const name = pick(FIRST)+" "+pick(LAST);
    return {id, kind:"passenger", title:"Passenger: "+name, dest,
      pay: 100 + dd*45 + (motive==="fugitive"?80:0), prestige:1, rep:[p.fac,1],
      needs:["pax:1"], pax:{name, motive, sick:false},
      desc:`${name} needs passage to ${PLANETS[dest].n}. They ${MOTIVES[motive].hint}.`};
  } else if(roll < 0.67){ // medical
    const units = ri(3,6);
    const deadline = S.day + dd + ri(1,2);
    return {id, kind:"medical", title:"URGENT: Serum run", dest, units, deadline,
      pay: 200 + dd*60, prestige:3, rep:[PLANETS[dest].fac,3],
      needs:["cargo:"+units,"mod:medbay"],
      desc:`${PLANETS[dest].n} has an outbreak. Deliver ${units} units of cold-chain serum by day ${deadline} or it spoils.`};
  } else if(roll < 0.79){ // bounty
    const tier = S.day>25 ? 1 : 0;
    return {id, kind:"bounty", title:"Bounty: "+pick(["\"Rustknife\" Vale","the Carrion Twins","Hollow-Eye Marek","the Dust Baron's enforcer"]), dest,
      pay: 350 + dd*50 + tier*150, prestige:3, rep:[p.fac,2], tier,
      needs:["mod:weapons","mod:armory"],
      desc:`A raider operating near ${PLANETS[dest].n}. Fly out, put them down, collect. Expect a real fight.`};
  } else if(roll < 0.89 && (p.fac==="syndicate" || S.rep.syndicate>=5)){ // smuggle
    const units = ri(4,8);
    return {id, kind:"smuggle", title:"No-questions freight", dest, units, hidden:true,
      pay: 250 + dd*70, prestige:0, rep:["syndicate",3],
      needs:["scargo:"+units,"mod:smuggler"],
      desc:`${units} units. Sealed. Hidden hold only. If a patrol scans you, that's your problem. Pays very well.`};
  } else if(roll < 0.89){ // fallback cargo
    const units = ri(6,12);
    return {id, kind:"cargo", title:"Freight: sealed containers", dest, units,
      pay: units*8 + dd*32, prestige:1, rep:[p.fac,1], needs:["cargo:"+units],
      desc:`Haul ${units} units to ${PLANETS[dest].n}. ${dd} day run.`};
  } else { // VIP
    const name = pick(["Senator Aduke","Magnate Orlov","Prima Callas","Baron Wexley","Directrix Sun"]);
    const minP = 8;
    return {id, kind:"vip", title:"VIP Charter: "+name, dest,
      pay: 300 + dd*80, prestige:4, rep:[p.fac,2], minPrestige:minP,
      needs:["vip:1","prestige:"+minP], pax:{name, motive:"vip", sick:false}, vip:true,
      desc:`${name} requires discreet, comfortable passage to ${PLANETS[dest].n}. Stateroom mandatory. Reputation required.`};
  }
}

function genRecruit(){
  const role = pick(Object.keys(ROLES));
  return {id:S.uid++, name:pick(FIRST)+" "+pick(LAST), role, fee:ri(60,140), salary:ri(7,14)};
}

function canAccept(m){
  const st = stats();
  for(const need of m.needs){
    const [k,v] = need.split(":");
    if(k==="cargo" && cargoUsed()+ +v > st.cargoCap) return [false, "Not enough cargo space"];
    if(k==="scargo" && scargoUsed()+ +v > st.scargoCap) return [false, "Not enough hidden cargo space"];
    if(k==="pax" && paxJobs().length+ +v > st.paxCap) return [false, "No free passenger berth"];
    if(k==="vip" && vipJobs().length+ +v > st.vipCap) return [false, "No free stateroom"];
    if(k==="mod" && st.active(v)===0) return [false, "Requires a functional, powered "+MODS[v].n];
    if(k==="prestige" && S.prestige < +v) return [false, "Requires "+v+" prestige"];
  }
  return [true, ""];
}
function needBadges(m){
  const st = stats();
  return m.needs.map(need=>{
    const [k,v] = need.split(":");
    let label="", ok=true;
    if(k==="cargo"){ label=v+" cargo"; ok = cargoUsed()+ +v <= st.cargoCap; }
    if(k==="scargo"){ label=v+" hidden cargo"; ok = scargoUsed()+ +v <= st.scargoCap; }
    if(k==="pax"){ label="1 berth"; ok = paxJobs().length < st.paxCap; }
    if(k==="vip"){ label="stateroom"; ok = vipJobs().length < st.vipCap; }
    if(k==="mod"){ ok = st.active(v)>0; label = MODS[v].n + (!ok && st.inst(v)>0 ? " (offline)" : ""); }
    if(k==="prestige"){ label=v+"★"; ok = S.prestige >= +v; }
    return `<span class="badge ${ok?"ok":"no"}">${label}</span>`;
  }).join("");
}

// ============================================================
// PLAYER ACTIONS — planet
// ============================================================
function acceptMission(i){
  const m = S.market.missions[i];
  if(!m) return;
  const [ok, why] = canAccept(m);
  if(!ok){ log("Can't take that job: "+why+"."); render(); return; }
  S.market.missions.splice(i,1);
  S.jobs.push(m);
  log(`Contract accepted: ${m.title} → ${PLANETS[m.dest].n}${m.deadline?" (by day "+m.deadline+")":""}.`);
  render();
}
function hire(i){
  const r = S.market.recruits[i];
  if(!r) return;
  if(S.crew.length >= stats().crewCap){ log("No bunks free — buy Crew Quarters first."); render(); return; }
  if(S.credits < r.fee){ log("Can't afford the signing fee."); render(); return; }
  S.credits -= r.fee;
  S.market.recruits.splice(i,1);
  S.crew.push(r);
  log(`Hired ${r.name}, ${ROLES[r.role].n}. Salary ${r.salary}cr/day.`);
  render();
}
function fireCrew(i){
  const c = S.crew[i];
  if(!c || !S.docked) return;
  S.crew.splice(i,1);
  log(`${c.name} collected their pay and walked down the ramp. No hard feelings. Mostly.`);
  render();
}
function buyGood(g,n){
  const price = S.market.prices[g];
  n = Math.min(n, Math.floor(S.credits/price), stats().cargoCap - cargoUsed());
  if(n<=0){ log("No room or no money."); render(); return; }
  S.credits -= n*price; S.cargo[g]+=n;
  log(`Bought ${n} ${GOODS[g].n} @ ${price}cr.`); render();
}
function sellGood(g,n){
  const price = Math.round(S.market.prices[g]*0.92);
  n = Math.min(n, S.cargo[g]);
  if(n<=0) return;
  S.credits += n*price; S.cargo[g]-=n;
  log(`Sold ${n} ${GOODS[g].n} @ ${price}cr.`); render();
}
function buyFuel(n){
  const p = PLANETS[S.loc].fuelP;
  n = Math.min(n, Math.floor(S.credits/p), Math.floor(stats().fuelCap - S.fuel));
  if(n<=0){ log("Tanks full or pockets empty."); render(); return; }
  S.credits -= n*p; S.fuel += n;
  log(`Refueled ${n} units @ ${p}cr.`); render();
}
function buyFood(n){
  const p = PLANETS[S.loc].foodP;
  n = Math.min(n, Math.floor(S.credits/p));
  if(n<=0){ log("Can't afford it."); render(); return; }
  S.credits -= n*p; S.food += n;
  log(`Bought ${n} food @ ${p}cr.`); render();
}
function repairShip(){
  const need = S.hullMax - S.hull;
  const cost = Math.min(need*4, S.credits);
  const pts = Math.floor(cost/4);
  if(pts<=0){ log("Nothing to repair, or no credits."); render(); return; }
  S.credits -= pts*4; S.hull += pts;
  log(`Yard crew patched ${pts} hull for ${pts*4}cr.`); render();
}
function yardPrice(t){
  const disc = PLANETS[S.loc].yard || 1;
  return Math.round(MODS[t].price*disc);
}
function buyMod(t){
  if(modInst().length >= S.slotsMax){ log("No free slot — buy a hull expansion."); render(); return; }
  const price = yardPrice(t);
  if(S.credits < price){ log("Not enough credits."); render(); return; }
  S.credits -= price;
  const m = mk(t);
  S.modules.push(m);
  const st = stats();
  if(MODS[t].pw && st.powerUse > st.powerOut){
    m.on = false;
    log(`Installed ${MODS[t].n} (−${price}cr) — but the reactor can't feed it. It's OFFLINE until you free up power.`);
  } else {
    log(`Installed ${MODS[t].n} (−${price}cr). The yard crew welds it in before lunch.`);
  }
  render();
}
function sellMod(idx){
  const m = modInst()[idx];
  if(!m || !S.docked) return;
  const t = m.t;
  const st = stats();
  const lose = m.dmg ? 0 : 1; // capacity this instance currently provides
  if(t==="cargohold" && cargoUsed() > st.cargoCap - lose*20){ log("Cargo hold isn't empty enough to remove."); render(); return; }
  if(t==="smuggler" && scargoUsed() > st.scargoCap - lose*10){ log("Hidden hold isn't empty."); render(); return; }
  if(t==="cabin" && paxJobs().length > st.paxCap - lose*2){ log("Passengers are using that cabin."); render(); return; }
  if(t==="luxcabin" && vipJobs().length > st.vipCap - lose){ log("Your VIP is in that stateroom."); render(); return; }
  if(t==="quarters" && S.crew.length > st.crewCap - lose*2){ log("Crew are bunked there — dismiss someone first."); render(); return; }
  const gain = Math.round(MODS[t].price * (m.dmg ? 0.4 : 0.6));
  S.modules.splice(S.modules.indexOf(m), 1);
  if(t==="fueltank") S.fuel = Math.min(S.fuel, stats().fuelCap);
  S.credits += gain;
  S.sel = null;
  powerRebalance();
  log(`Sold ${m.dmg?"the wreckage of the ":""}${MODS[t].n} for ${gain}cr.`);
  render();
}
function upgradeEngine(){
  const cost = S.engineLvl===1 ? 500 : 1100;
  if(S.engineLvl>=3){ return; }
  if(S.credits<cost){ log("Not enough credits."); render(); return; }
  S.credits -= cost; S.engineLvl++;
  log(`Drive Core upgraded to Mk-${["","I","II","III"][S.engineLvl]}. She purrs now.`);
  render();
}
function buySlots(){
  const cost = S.slotsMax===6 ? 600 : 1200;
  if(S.slotsMax>=10) return;
  if(S.credits<cost){ log("Not enough credits."); render(); return; }
  S.credits -= cost; S.slotsMax += 2;
  log(`Hull expansion welded on. +2 module slots (−${cost}cr).`);
  render();
}

// ============================================================
// TRAVEL / TIME
// ============================================================
function depart(destId){
  if(!S.docked || S.travel) return;
  const d = daysTo(S.loc, destId);
  const f = fuelTo(S.loc, destId);
  if(S.fuel < f){ log(`Not enough fuel — need ${f}, have ${Math.floor(S.fuel)}.`); render(); return; }
  S.travel = {from:S.loc, dest:destId, total:d, left:d};
  S.docked = false;
  S.screen = "travel";
  S.selPlanet = null;
  log(`Departed ${PLANETS[S.loc].n} for ${PLANETS[destId].n}. ${d} days out. ${pick([
    "The dock clamps release with a clang you feel in your teeth.",
    "The drive lights and the whole ship leans into it, eager.",
    "Ground control mutters something about unpaid berth fees. You're already gone.",
    "Behind you, the port shrinks to a bright pinprick, then nothing.",
  ])}`);
  render();
}

function waitDay(){
  dayTick(false);
  if(S.over) return;
  log("You wait a day in port. The dockworkers play cards. The meter runs.");
  render();
}

function advanceDay(){
  if(!S.travel || S.over) return;
  dayTick(true);
  if(S.over || MODAL_HTML) { render(); return; }
  S.travel.left--;
  if(S.travel.left<=0){ arrive(); render(); return; }
  // events
  if(S.arc.stage===5 && Math.random()<0.45){ evHunter(); render(); return; }
  const arcJob = S.jobs.find(j=>j.arcVoss);
  if(arcJob && !S.arc.ambushed && S.travel.dest==="havens"){
    S.arc.ambushed = true; evAmbush(); render(); return;
  }
  if(Math.random() < 0.42) rollEvent();
  render();
}

function dayTick(traveling){
  S.day++;
  const st = stats();
  // fuel
  if(traveling){
    S.fuel = +(S.fuel - st.fuelDay).toFixed(1);
    if(S.fuel <= 0){ S.fuel = 0; evAdrift(); }
  }
  // food
  const eat = foodPerDay();
  S.food += st.foodGen;
  S.food -= eat;
  if(S.food < 0){
    S.food = 0; S.starve++;
    S.prestige = Math.max(0, S.prestige-1);
    if(S.starve===2) log("The pantry is empty. Everyone's rationing air-paste and resentment.");
    if(S.starve===4 && S.crew.length>0){
      const c = S.crew.pop();
      log(`${c.name} is too weak to work and jumps ship at the first chance. Starvation is bad for retention.`);
    }
    if(S.starve>=6){ gameOver("You starved in the black. The ship drifts on, a quiet tomb with your name on the registry."); return; }
    if(S.starve>=2) log("⚠ STARVING — buy food, fast.");
  } else {
    S.starve = 0;
  }
  // salaries
  const pay = salaries();
  if(pay>0){
    if(S.credits >= pay){ S.credits -= pay; S.unpaid = 0; }
    else {
      S.unpaid++;
      log("⚠ You couldn't make payroll. The crew notices these things.");
      if(S.unpaid>=3 && S.crew.length>0){
        const c = S.crew.shift();
        log(`${c.name} quit over back pay. Word gets around (−2 prestige).`);
        S.prestige = Math.max(0, S.prestige-2);
        S.unpaid = 1;
      }
    }
  }
  // mechanic works in flight: hull first, then jury-rigging broken modules
  if(traveling && st.has("mechanic")){
    if(S.hull < S.hullMax){
      const amt = st.active("workshop")>0 ? 6 : 3;
      S.hull = Math.min(S.hullMax, S.hull+amt);
    }
    const dmgd = S.modules.filter(m => m.dmg);
    if(dmgd.length && Math.random() < (st.active("workshop")>0 ? 0.6 : 0.3)){
      const m = pick(dmgd);
      m.dmg = false;
      powerRebalance();
      log(`🔧 Your mechanic jury-rigs the ${MODS[m.t].n} back online. It sounds wrong, but it works.`);
    }
  }
  // deadlines
  for(const j of S.jobs.slice()){
    if(j.deadline && S.day > j.deadline){
      failJob(j, `Deadline blown on "${j.title}". The cargo is worthless and your name is mud (−3 prestige).`);
    }
  }
  // arc run deadline
  if(S.arc.stage===5 && S.arc.deadline && S.day > S.arc.deadline){
    arcIntercept();
  }
}

function failJob(j, msg){
  S.jobs = S.jobs.filter(x=>x.id!==j.id);
  S.prestige = Math.max(0, S.prestige-3);
  if(j.rep) S.rep[j.rep[0]] = clamp(S.rep[j.rep[0]]-2, -20, 20);
  log(msg);
}

function arrive(){
  const dest = S.travel.dest;
  S.loc = dest; S.docked = true; S.travel = null; S.screen = "ship";
  log(`Docked at ${PLANETS[dest].n}.`);
  // victory check
  if(dest==="gate" && S.arc.stage===5){ arcVictory(); return; }
  // deliveries
  const arrivals = S.jobs.filter(j=>j.dest===dest);
  for(const j of arrivals){
    if(j.kind==="bounty"){
      // fight on arrival
      S.jobs = S.jobs.filter(x=>x.id!==j.id);
      const e = j.tier ? {name:"Corsair "+j.title.replace("Bounty: ",""), hull:60, dmg:13, loot:0} :
                         {name:j.title.replace("Bounty: ",""), hull:40, dmg:10, loot:0};
      const jj = j;
      startCombat(e,
        ()=>{ completePay(jj); log(`Bounty collected on ${e.name}.`); },
        ()=>{ log("The bounty got away. The contract's void (−1 prestige)."); S.prestige=Math.max(0,S.prestige-1); });
      return; // combat modal takes over; other deliveries wait? deliver them too after — simplest: deliver rest now
    }
  }
  for(const j of arrivals){
    if(j.kind==="bounty") continue;
    S.jobs = S.jobs.filter(x=>x.id!==j.id);
    completePay(j);
    if(j.arcCrate){ arcVergeScene(); }
    if(j.arcVoss){ arcHavensScene(); }
  }
  refreshMarket();
}

function completePay(j){
  const st = stats();
  let pay = j.pay;
  if(st.has("quartermaster")) pay = Math.round(pay*1.15);
  if(j.vip && j.pax && !j.pax.sick && st.active("luxcabin")===0){
    pay = Math.round(pay*0.6);
    log(`${j.pax.name} spent the trip in an unpowered stateroom and deducts 40% of the fare, itemized, with footnotes.`);
  }
  if(j.pax && j.pax.sick){ pay = Math.round(pay*0.5); S.prestige=Math.max(0,S.prestige-1);
    log(`${j.pax.name} disembarks pale and furious. Half pay.`); }
  S.credits += pay;
  S.prestige += j.prestige||0;
  if(j.rep) S.rep[j.rep[0]] = clamp(S.rep[j.rep[0]]+(j.rep[1]||1), -20, 20);
  log(`✓ ${j.title} — paid ${fmt(pay)}cr${j.prestige?", +"+j.prestige+" prestige":""}.`);
  if(j.pax && j.pax.motive==="spy"){
    const f = pick(["union","frontier","syndicate"]);
    const up = Math.random()<0.5;
    S.rep[f] = clamp(S.rep[f]+(up?3:-3),-20,20);
    log(`Days later, news breaks that traces back to your passenger. ${FACS[f].n} ${up?"approves":"is displeased"}.`);
  }
  if(j.pax && j.pax.motive==="pilgrim"){ S.prestige+=1; log("The pilgrim blesses your ship on the ramp. Passersby notice. (+1 prestige)"); }
  if(j.pax && j.pax.motive==="fugitive"){ S.rep.frontier=clamp(S.rep.frontier+2,-20,20); S.rep.syndicate=clamp(S.rep.syndicate+1,-20,20); }
}

function rollEvent(){
  const st = stats();
  const pool = [];
  const add = (w,f)=>{ for(let i=0;i<w;i++) pool.push(f); };
  add(3, evPirates);
  add(2, evPatrol);
  add(2, evBreakdown);
  add(2, evMeteor);
  add(2, evSalvage);
  add(2, evDistress);
  add(2, evTrader);
  if(S.jobs.some(j=>j.pax)) add(3, evPax);
  add(3, evQuiet);
  pick(pool)();
}

function evQuiet(){
  const st = stats();
  const lines = QUIET.slice();
  if(st.active("hydro")) lines.push("The hydroponics bay smells like rain today. Closest thing to weather in a hundred million klicks.");
  if(st.inst("hydro") && !st.active("hydro")) lines.push("The dark hydroponics bay stares back at you accusingly. The beans are not growing themselves.");
  if(st.inst("medbay")) lines.push("The auto-doc runs its self-test and declares everyone aboard \"adequately alive.\"");
  if(st.inst("weapons")) lines.push("Someone left a wrench balanced on the weapons console. You leave it there. It's tradition now.");
  if(st.inst("luxcabin")) lines.push("Soft music drifts from the stateroom. Whatever they're paying, it isn't quite enough.");
  if(st.inst("smuggler")) lines.push("You check the false floor in the hold. Still false. Still a floor. Good.");
  if(st.inst("reactor")) lines.push("The auxiliary reactor's hum changes pitch for three seconds and every head on the ship comes up. Then it settles. Everyone pretends they weren't scared.");
  if(S.crew.length===0) lines.push("You eat dinner alone in the galley with one boot up on the table, like a captain of industry.");
  if(S.modules.some(m=>m.dmg)) lines.push("Something broken rattles behind a panel in time with the drive. You name it Steve.");

}

function evPirates(){
  const tough = S.day>22 || Math.random()<0.3;
  const e = tough ? {name:"Pirate Corsair", hull:55, dmg:12, bribe:280, loot:250}
                  : {name:"Pirate Skiff",   hull:32, dmg:8,  bribe:150, loot:130};
  modal(`<h2>⚠ Contact — ${e.name}</h2>
    <p>A ${e.name.toLowerCase()} burns hard on an intercept course, weapons hot. The comm crackles: <i>"Cut engines and prepare to be boarded, or be scrap."</i></p>
    <div class="choices">
      <button onclick="closeModal(); startCombat(${JSON.stringify(e).replace(/"/g,"&quot;")}, pirateWin, pirateLoseFlee)">Battle stations</button>
      <button onclick="pirateFlee(${e.dmg})">Punch it and run ${stats().has("pilot")?"(pilot aboard — good odds)":""}</button>
      <button onclick="pirateBribe(${e.bribe})">Pay them off (${bribeCost(e.bribe)}cr)</button>
      <button onclick="pirateSurrender()">Surrender the cargo</button>
    </div>`);
}
function bribeCost(base){ return Math.round(base * (stats().has("quartermaster")?0.65:1)); }
function pirateWin(){ const loot = ri(100,300); S.credits+=loot; S.prestige+=2; log(`Pirates destroyed. Salvaged ${loot}cr from the wreck. (+2 prestige)`); }
function pirateLoseFlee(){ log("You broke off and ran. The hull remembers."); }
function pirateFlee(dmg){
  const st = stats();
  const chance = 0.35 + (st.has("pilot")?0.25:0) + S.engineLvl*0.08;
  if(Math.random()<chance){ closeModal(); log("You redline the drive and lose them in a debris field. Hearts pounding, hull intact."); }
  else {
    const hit = ri(Math.round(dmg*0.8), Math.round(dmg*1.5));
    S.hull -= Math.max(1, hit - st.shield);
    closeModal();
    log(`They clipped you as you ran (−${Math.max(1,hit-st.shield)} hull), but you got away.`);
    checkDead("Shot apart while running from pirates.");
  }
}
function pirateBribe(base){
  const cost = bribeCost(base);
  if(S.credits<cost){ log("You can't cover the toll. They're not in a bartering mood."); closeModal(); evPiratesForce(base); return; }
  S.credits-=cost; closeModal();
  log(`Paid ${cost}cr in "docking fees." The pirates wave politely and burn away.`);
}
function evPiratesForce(base){
  const e = base>200 ? {name:"Pirate Corsair", hull:55, dmg:12} : {name:"Pirate Skiff", hull:32, dmg:8};
  startCombat(e, pirateWin, pirateLoseFlee);
}
function pirateSurrender(){
  const lost = S.cargo.ore+S.cargo.med+S.cargo.lux;
  S.cargo={ore:0,med:0,lux:0};
  const cr = Math.round(S.credits*0.3);
  S.credits-=cr;
  S.prestige=Math.max(0,S.prestige-2);
  closeModal();
  log(`They stripped ${lost} units of goods and ${cr}cr, and left you your life. (−2 prestige)`);
}

function evPatrol(){
  const contraband = scargoUsed()>0;
  const fugitive = S.jobs.some(j=>j.pax && j.pax.motive==="fugitive" && !j.arcVoss);
  if(!contraband && !fugitive){
    log("A Union patrol pings your transponder, runs your registry, and moves on. You breathe again.");
    return;
  }
  const problem = contraband ? "there's a sealed hold full of no-questions freight aboard" : "your passenger's face is on a warrant somewhere";
  modal(`<h2>🛰 Union Patrol — Compliance Scan</h2>
    <p>A Union cutter orders you to hold for inspection. Standard sweep — except ${problem}.</p>
    <div class="choices">
      <button onclick="patrolBribe()">Slip the inspector a gratuity (${bribeCost(180)}cr)</button>
      <button onclick="patrolRun()">Run for it</button>
      <button onclick="patrolSubmit()">Submit to the scan</button>
    </div>`);
}
function patrolBribe(){
  const cost = bribeCost(180);
  if(S.credits<cost){ closeModal(); log("Pockets too light to bribe. The scan proceeds..."); patrolSubmit(true); return; }
  S.credits-=cost; closeModal();
  if(Math.random()<0.85){ log(`The inspector finds a ${cost}cr "clerical fee" and suddenly your paperwork is immaculate.`); }
  else { log("The inspector takes your money AND reports you. Bureaucrats."); patrolSubmit(true); }
}
function patrolRun(){
  closeModal();
  const st = stats();
  const chance = 0.3 + (st.has("pilot")?0.25:0) + S.engineLvl*0.08;
  if(Math.random()<chance){ S.rep.union=clamp(S.rep.union-2,-20,20); log("You spool the drive and vanish into the shipping lanes. The Union files a very angry report (−2 Union rep)."); }
  else startCombat({name:"Union Cutter", hull:50, dmg:11},
    ()=>{ S.rep.union=clamp(S.rep.union-8,-20,20); log("You shot down a Union cutter. That... will be remembered (−8 Union rep)."); },
    ()=>{ log("You broke away trailing smoke."); });
}
function patrolSubmit(noModal){
  if(!noModal) closeModal();
  const contraJobs = S.jobs.filter(j=>j.hidden);
  const fugJobs = S.jobs.filter(j=>j.pax && j.pax.motive==="fugitive" && !j.arcVoss);
  let msg = [];
  if(contraJobs.length){
    for(const j of contraJobs) S.jobs = S.jobs.filter(x=>x.id!==j.id);
    const fine = Math.min(S.credits, 250);
    S.credits-=fine; S.rep.union=clamp(S.rep.union-3,-20,20); S.rep.syndicate=clamp(S.rep.syndicate-3,-20,20);
    msg.push(`Contraband confiscated, ${fine}cr fine, and the Syndicate is unhappy about their lost freight.`);
  }
  if(fugJobs.length){
    for(const j of fugJobs){ S.jobs = S.jobs.filter(x=>x.id!==j.id); msg.push(`${j.pax.name} is dragged off in cuffs. No pay. (−3 prestige)`); }
    S.prestige=Math.max(0,S.prestige-3);
  }
  if(!msg.length) msg.push("The scan comes up clean. The inspector looks disappointed.");
  log(msg.join(" "));
}

function evBreakdown(){
  const st = stats();
  // half the time it's a specific system that lets go
  if(Math.random()<0.5 && damageModule("Breakdown")) return;
  let dmg = ri(8,15);
  if(st.has("mechanic")) dmg = Math.ceil(dmg/2);
  S.hull -= dmg;
  log(`A coolant line ruptures in the engine room. ${st.has("mechanic")?"Your mechanic contains it fast":"You duct-tape it at 3am"} (−${dmg} hull).`);
  checkDead("The drive core cascade-failed somewhere dark and empty.");
}
function evMeteor(){
  const st = stats();
  if(st.has("pilot")){ log("Micro-meteor swarm ahead — your pilot threads the ship through it like a needle. Not a scratch."); return; }
  const dmg = Math.max(1, ri(6,12)-st.shield);
  S.hull -= dmg;
  log(`Micro-meteor swarm. The hull sounds like a tin roof in hail (−${dmg} hull).`);
  checkDead("A rock the size of a fist ended the whole story.");
}
function evSalvage(){
  const space = stats().cargoCap - cargoUsed();
  if(space>=3){
    const g = pick(["ore","med","lux"]);
    const n = Math.min(space, ri(3,8));
    S.cargo[g]+=n;
    log(`You spot a drifting cargo pod, cracked open like an egg. Salvaged ${n} ${GOODS[g].n}. Finders keepers.`);
  } else {
    const cr = ri(40,110);
    S.credits+=cr;
    log(`A drifting wreck yields ${cr}cr in scrap components. No room for anything bigger.`);
  }
}
function evDistress(){
  modal(`<h2>📡 Distress Signal</h2>
    <p>A weak beacon: a mining shuttle, life support failing, three souls aboard. Helping costs time and supplies. Space is full of stories about fake beacons, too.</p>
    <div class="choices">
      <button onclick="distressHelp()">Alter course and help (−3 food)</button>
      <button onclick="distressIgnore()">Keep flying. Not your problem.</button>
    </div>`);
}
function distressHelp(){
  closeModal();
  S.food = Math.max(0, S.food-3);
  if(Math.random()<0.75){
    const cr = ri(100,260);
    S.credits+=cr; S.prestige+=2;
    log(`You pull three grateful miners out of a dying shuttle. Their guild wires ${cr}cr and your name travels well (+2 prestige).`);
  } else {
    S.prestige+=2;
    log("You save three miners who have nothing to give but thanks. Word still gets around (+2 prestige).");
  }
}
function distressIgnore(){
  closeModal();
  S.prestige=Math.max(0,S.prestige-1);
  log("You mute the beacon and fly on. The silence in the cockpit lasts a while (−1 prestige).");
}
function evTrader(){
  modal(`<h2>🛒 Tinker Barge "Bargain"</h2>
    <p>A patchwork trader hails you, grinning through static: <i>"Fuel, food, fair-ish prices! Also buying goods at a premium — I know a guy."</i></p>
    <div class="choices">
      <button onclick="traderBuy('fuel')">Buy 10 fuel — 70cr</button>
      <button onclick="traderBuy('food')">Buy 10 food — 30cr</button>
      <button onclick="traderSell()">Sell all trade goods at 115% market</button>
      <button onclick="closeModal(); log('You wave the tinker off. He sells you nothing but a bad feeling.')">Not today</button>
    </div>`);
}
function traderBuy(what){
  if(what==="fuel"){
    if(S.credits<70){ log("Can't afford it."); closeModal(); return; }
    S.credits-=70; S.fuel=Math.min(stats().fuelCap, S.fuel+10); log("Bought 10 fuel off the tinker barge.");
  } else {
    if(S.credits<30){ log("Can't afford it."); closeModal(); return; }
    S.credits-=30; S.food+=10; log("Bought 10 food off the tinker barge. Don't ask what's in the cans.");
  }
  closeModal();
}
function traderSell(){
  let total=0;
  for(const g in GOODS){
    if(S.cargo[g]>0){ total += Math.round(S.cargo[g]*GOODS[g].base*1.15); S.cargo[g]=0; }
  }
  closeModal();
  if(total>0){ S.credits+=total; log(`The tinker pays ${total}cr for the lot and asks zero questions.`); }
  else log("You have nothing to sell. The tinker looks personally offended.");
}
function evPax(){
  const jobs = S.jobs.filter(j=>j.pax);
  if(!jobs.length){ evQuiet(); return; }
  const j = pick(jobs);
  const p = j.pax;
  const st = stats();
  if(p.motive==="merchant" && Math.random()<0.6){
    const g = pick(["med","lux"]);
    if(S.cargo[g]>0){
      const price = Math.round(GOODS[g].base*1.4);
      const n = S.cargo[g];
      modal(`<h2>💼 A Private Offer</h2>
        <p>${p.name} taps your cargo manifest. <i>"That ${GOODS[g].n.toLowerCase()} — I'll take all ${n} units at ${price} a head, right now, cash."</i></p>
        <div class="choices">
          <button onclick="paxMerchantSell('${g}',${price})">Sell (${n*price}cr)</button>
          <button onclick="closeModal(); log('You decline. ${p.name.replace(/'/g,"")} shrugs and goes back to their bunk.')">Decline</button>
        </div>`);
      return;
    }
  }
  if(Math.random()<0.35 && !p.sick){
    p.sick = true;
    if(st.active("medbay")>0 && st.has("medic")){
      p.sick=false; log(`${p.name} spikes a fever. Your medic has them stabilized in the med bay within hours. Crisis averted.`);
    } else if(st.active("medbay")>0){
      if(Math.random()<0.6){ p.sick=false; log(`${p.name} falls ill. The med bay's auto-doc patches them up, mostly.`); }
      else log(`${p.name} falls ill. The auto-doc helps but they're in rough shape. They won't pay full fare like this.`);
    } else {
      log(`${p.name} falls seriously ill and you have no working med bay. Soup and prayers. They will NOT be paying full fare (−half pay on arrival).`);
    }
    return;
  }
  if(p.motive==="fugitive") log(`${p.name} spends the night watching the airlock and doesn't sleep. Neither do you, quite.`);
  else if(p.motive==="spy") log(`You catch ${p.name} near the comms panel, "just admiring the equipment." Sure.`);
  else log(`${p.name} joins the crew for dinner. Turns out they're decent company out here.`);
}
function paxMerchantSell(g,price){
  const n = S.cargo[g];
  S.cargo[g]=0; S.credits+=n*price;
  closeModal();
  log(`Sold ${n} ${GOODS[g].n} to your passenger for ${n*price}cr. Best kind of cargo — the kind that pays twice.`);
}

function evAdrift(){
  modal(`<h2>⛽ Tanks Dry</h2>
    <p>The drive coughs, stutters, dies. You are adrift in the deep black. The silence is total and the options are few.</p>
    <div class="choices">
      <button onclick="adriftTow()">Send an SOS — commercial tow (expensive, humiliating)</button>
    </div>`);
}
function adriftTow(){
  closeModal();
  const cost = Math.max(200, Math.round(S.credits*0.4));
  let nearest = null, best=1e9;
  for(const k in PLANETS){
    if(PLANETS[k].hidden && S.arc.stage<5) continue;
    if(k===S.loc) continue;
    const from = S.travel ? S.travel.from : S.loc;
    const d = dist(from,k);
    if(d<best){best=d; nearest=k;}
  }
  if(S.credits>=cost){
    S.credits-=cost;
    log(`A tow barge hauls you to ${PLANETS[nearest].n} for ${cost}cr. The crew laughs the whole way (−3 prestige).`);
  } else {
    const seized = S.cargo.ore+S.cargo.med+S.cargo.lux;
    S.cargo={ore:0,med:0,lux:0};
    S.credits=0;
    log(`You can't pay the tow. They seize your credits and ${seized} units of cargo as "salvage compensation" (−3 prestige).`);
  }
  S.prestige=Math.max(0,S.prestige-3);
  S.fuel = 8;
  S.travel = null; S.docked = true; S.loc = nearest; S.screen="ship";
  refreshMarket();
}

function checkDead(msg){
  if(S.hull<=0){ gameOver(msg || "The hull gave out. It was quick, at least."); return true; }
  return false;
}

// ============================================================
// COMBAT
// ============================================================
function startCombat(e, onWin, onEscape){
  C = {e:{...e, maxhull:e.hull}, onWin, onEscape, log:["Contact! "+e.name+" is closing to firing range."], over:false};
  drawCombat();
}
function drawCombat(){
  const st = stats();
  const e = C.e;
  const php = Math.max(0, Math.round(S.hull/S.hullMax*100));
  const ehp = Math.max(0, Math.round(e.hull/e.maxhull*100));
  const canBribe = e.bribe && !C.over;
  modal(`<h2>⚔ ${e.name}</h2>
    <div><b>${S.shipName}</b> — hull ${Math.max(0,Math.round(S.hull))}/${S.hullMax} ${st.shield?("· shields −"+st.shield+"/hit"):""}</div>
    <div class="hpbar"><div class="f" style="width:${php}%; background:${php>40?"#6fbf73":"#d96b6b"}"></div></div>
    <div><b>${e.name}</b> — hull ${Math.max(0,Math.round(e.hull))}/${e.maxhull}</div>
    <div class="hpbar"><div class="f" style="width:${ehp}%; background:#d96b6b"></div></div>
    <div class="clog">${C.log.map(l=>"<div>› "+l+"</div>").join("")}</div>
    ${C.over ? `<div class="choices"><button class="primary" onclick="endCombat()">Continue</button></div>` :
    `<div class="choices">
      <button onclick="cAct('fire')">🎯 Fire (your damage: ~${st.dmg})</button>
      <button onclick="cAct('brace')">🛡 Evasive maneuvers (halve incoming this turn)</button>
      <button onclick="cAct('flee')">🏃 Flee (${Math.round((0.35+(st.has("pilot")?0.25:0)+S.engineLvl*0.08)*100)}% chance)</button>
      ${canBribe?`<button onclick="cAct('bribe')">💰 Bribe (${bribeCost(e.bribe)}cr)</button>`:""}
    </div>`}`);
}
function cAct(a){
  const st = stats();
  const e = C.e;
  let braced = false;
  if(a==="fire"){
    const dmg = ri(Math.round(st.dmg*0.7), Math.round(st.dmg*1.3));
    e.hull -= dmg;
    C.log.push(`You fire — ${dmg} damage to the ${e.name}.`);
    if(e.hull<=0){
      C.log.push(`The ${e.name} breaks apart in a slow, silent bloom of fire.`);
      C.over=true; C.result="win"; drawCombat(); return;
    }
  } else if(a==="brace"){
    braced = true;
    C.log.push("You throw the ship into a corkscrew. Hard to hit, hard to keep lunch down.");
  } else if(a==="flee"){
    const chance = 0.35 + (st.has("pilot")?0.25:0) + S.engineLvl*0.08;
    if(Math.random()<chance){
      C.log.push("You redline the drive and break contact. Gone.");
      C.over=true; C.result="fled"; drawCombat(); return;
    }
    C.log.push("They match your burn. No escape this pass.");
  } else if(a==="bribe"){
    const cost = bribeCost(e.bribe);
    if(S.credits>=cost){
      S.credits-=cost;
      C.log.push(`You transfer ${cost}cr. The ${e.name} peels away, satisfied.`);
      C.over=true; C.result="fled"; drawCombat(); return;
    }
    C.log.push("Not enough credits. They laugh on an open channel.");
  }
  // enemy turn
  let hit = ri(Math.round(e.dmg*0.7), Math.round(e.dmg*1.4));
  hit = Math.max(1, hit - st.shield);
  if(braced) hit = Math.ceil(hit/2);
  S.hull -= hit;
  C.log.push(`The ${e.name} fires — ${hit} damage${braced?" (halved)":""}${st.shield?" (shields absorbed "+st.shield+")":""}.`);
  if(S.hull<=0){
    C.log.push("Alarms. Fire. Silence.");
    C.over=true; C.result="dead"; drawCombat(); return;
  }
  if(hit>=8 && Math.random()<0.25 && damageModule("Direct hit")){
    C.log.push("⚠ That one got through to a module — a system just went dark. Check the ship after.");
  }
  drawCombat();
}
function endCombat(){
  const r = C.result;
  const onWin = C.onWin, onEscape = C.onEscape;
  C = null;
  MODAL_HTML = null; drawModal();
  if(r==="dead"){ gameOver("Your ship broke apart under enemy fire. The black keeps what it takes."); return; }
  if(r==="win" && onWin) onWin();
  if(r==="fled" && onEscape) onEscape();
  render();
}

function arcAcceptCrate(){
