// ============================================================
// RENDER
// ============================================================
function render(){
  if(!S) return;
  renderTop(); renderNav(); renderMain(); renderSide();
  save();
}
function stat(icon, val, isLow, title){
  return `<span class="stat" title="${title||""}">${icon} <b class="${isLow?"low":""}">${val}</b></span>`;
}
function renderTop(){
  const st = stats();
  const loc = S.travel ? `→ ${PLANETS[S.travel.dest].n}` : PLANETS[S.loc].n;
  const run = S.arc.stage===5 && S.arc.deadline ? ` <span class="low">◆ RUN: day ${S.arc.deadline} deadline</span>` : "";
  $("topbar").innerHTML =
    `<span class="ship-name">☄ ${S.shipName}</span>` +
    stat("💰", fmt(S.credits)+"cr", S.credits<100, "Credits") +
    stat("⛽", Math.floor(S.fuel)+"/"+st.fuelCap, S.fuel<10, "Fuel (burn "+st.fuelDay+"/day in flight)") +
    stat("🍞", Math.floor(S.food), S.food<foodPerDay()*2, "Food ("+foodPerDay()+"/day eaten, +"+st.foodGen+" grown)") +
    stat("🛠", Math.round(S.hull)+"/"+S.hullMax, S.hull<40, "Hull") +
    stat("⚡", st.powerUse+"/"+st.powerOut, S.modules.some(m=>m.dmg), "Reactor power: drawn/output — red means damaged systems aboard") +
    stat("⭐", S.prestige, false, "Prestige — reputation as a captain") +
    stat("📅", "Day "+S.day, false, "") +
    `<span class="stat dim">📍 ${loc}</span>` + run;
}
function renderNav(){
  const b = (id,label,on,dis)=>`<button class="${on?"tab-on":""}" ${dis?"disabled":""} onclick="nav('${id}')">${label}</button>`;
  $("nav").innerHTML =
    b("ship","🚀 Ship", S.screen==="ship") +
    b("map","🗺 Star Map", S.screen==="map") +
    (S.docked ? b("planet","🏙 "+PLANETS[S.loc].n, S.screen==="planet", S.loc==="gate") : "") +
    (S.travel ? b("travel","🌌 In Transit", S.screen==="travel") : "") +
    `<span class="right">
      <button onclick="showHelp()">? Help</button>
      <button class="danger" onclick="confirmNewGame()">New Game</button>
    </span>`;
}
function nav(scr){ S.screen = scr; if(scr==="planet") refreshMarket(); render(); }

function renderMain(){
  const m = $("main");
  if(S.screen==="ship") m.innerHTML = shipHTML();
  else if(S.screen==="map") m.innerHTML = mapHTML();
  else if(S.screen==="planet") m.innerHTML = planetHTML();
  else if(S.screen==="travel") m.innerHTML = travelHTML();
}

// ---- ship screen ----
function shipHTML(){
  const st = stats();
  const inst = modInst();
  let slotsHtml = "";
  for(let i=0;i<10;i++){
    if(i < inst.length){
      const m = inst[i], md = MODS[m.t];
      const led = m.dmg ? "r" : (md.pw ? (m.on ? "g" : "o") : "g");
      const cls = (m.dmg?" dmgd":"") + (!m.dmg && md.pw && !m.on ? " offline":"") + (S.sel===i?" selected":"");
      slotsHtml += `<div class="slot filled${cls}" onclick="selSlot(${i})" title="${md.n}${m.dmg?" — DAMAGED":(md.pw&&!m.on&&!m.dmg?" — powered down":"")}">
        <span class="led ${led}"></span>
        ${md.pw?`<span class="pips">${"⚡".repeat(md.pw)}</span>`:""}${md.gen?`<span class="pips">+${md.gen}⚡</span>`:""}
        <span class="ic">${md.icon}</span>${md.n}</div>`;
    } else if(i < S.slotsMax){
      slotsHtml += `<div class="slot" onclick="selSlot(-1)"><span class="ic">＋</span><span class="dim">empty bay</span></div>`;
    } else {
      slotsHtml += `<div class="slot locked"><span class="ic">🔒</span><span class="dim">hull expansion</span></div>`;
    }
  }
  let selHtml = "";
  if(S.sel!=null && S.sel>=0 && inst[S.sel]){
    const m = inst[S.sel], md = MODS[m.t];
    const status = m.dmg ? '<b class="low">⛔ DAMAGED — offline</b>' :
      md.pw ? (m.on ? `<b style="color:var(--green)">● ONLINE</b> <span class="dim">· drawing ${md.pw}⚡</span>`
                    : `<b class="dim">○ POWERED DOWN</b> <span class="dim">· would draw ${md.pw}⚡</span>`) :
      (md.gen ? `<b style="color:var(--green)">● GENERATING</b> <span class="dim">· +${md.gen}⚡</span>`
              : '<b style="color:var(--green)">● OPERATIONAL</b> <span class="dim">· passive, no power draw</span>');
    selHtml = `<div class="panel"><h3>${md.icon} ${md.n}</h3>
      <p style="margin-bottom:6px">${status}</p>
      <p class="dim" style="margin-bottom:8px">${md.d}</p>
      ${m.dmg?'<p class="dim" style="margin-bottom:8px">Repair at any shipyard dry dock (80cr), or a mechanic may jury-rig it in flight.</p>':""}
      <div style="display:flex; gap:6px; flex-wrap:wrap">
        ${md.pw && !m.dmg ? `<button onclick="toggleMod(${S.sel})">${m.on?"⏻ Power down":"⏻ Power up (+"+md.pw+"⚡)"}</button>`:""}
        <button ${S.docked?"":"disabled"} onclick="sellMod(${S.sel})">Sell for ${Math.round(md.price*(m.dmg?0.4:0.6))}cr${S.docked?"":" (dock first)"}</button>
      </div></div>`;
  } else if(S.sel===-1){
    selHtml = `<div class="panel"><h3>Empty Slot</h3><p class="dim">Buy modules at any planet's Shipyard. Foundry runs 15% off.</p></div>`;
  }
  const crewHtml = S.crew.length ? S.crew.map((c,i)=>
    `<div class="card"><div class="title">${c.name} <span class="dim">— ${ROLES[c.role].n}, ${c.salary}cr/day</span></div>
     <div class="dim">${ROLES[c.role].d}</div>
     ${S.docked?`<button style="margin-top:6px" onclick="fireCrew(${i})">Dismiss</button>`:""}</div>`).join("")
    : `<div class="dim">No crew. It's just you, the hum of the recyclers, and every job on the ship. Hire hands in planet cantinas (needs Crew Quarters).</div>`;
  const paxAll = S.jobs.filter(j=>j.pax);
  const paxHtml = paxAll.length ? paxAll.map(j=>
    `<div class="card"><div class="title">${j.pax.name} ${j.pax.sick?'<span class="low">(sick)</span>':""} <span class="dim">→ ${PLANETS[j.dest].n}</span></div>
     <div class="dim">${j.pax.motive==="vip"?"VIP — expects the good towels.":MOTIVES[j.pax.motive]?MOTIVES[j.pax.motive].d:""}</div></div>`).join("")
    : `<div class="dim">No passengers aboard.</div>`;
  const jobsHtml = S.jobs.length ? S.jobs.map(j=>
    `<div class="card"><div class="title">${j.title}</div>
     <div class="dim">→ ${PLANETS[j.dest].n} · <span class="pay">${fmt(j.pay)}cr</span>${j.deadline?` · <span class="${S.day+daysTo(S.loc,j.dest)>j.deadline?"low":""}">by day ${j.deadline}</span>`:""}${j.units?` · ${j.units}u${j.hidden?" hidden":""}`:""}</div></div>`).join("")
    : `<div class="dim">No active contracts. The bank account won't fill itself — hit a cantina.</div>`;
  const repHtml = Object.keys(FACS).filter(f=>f!=="none").map(f=>{
    const v = S.rep[f];
    const pct = (v+20)/40*100;
    return `<div style="font-size:12px">${FACS[f].n} <span class="dim">(${v>0?"+":""}${v})</span></div>
      <div class="repbar"><div class="f" style="left:0;width:${pct}%;background:${FACS[f].c}"></div></div>`;
  }).join("");
  return `<div class="row">
    <div class="col" style="max-width:340px">
      <div class="panel"><h3>${S.shipName} — deck plan</h3>
        <div class="shipvis">
          <div class="nose"><div class="canopy"></div>COCKPIT</div>
          <div class="hullbody"><div class="slotgrid">${slotsHtml}</div></div>
          <div class="tail">DRIVE CORE MK-${["","I","II","III"][S.engineLvl]}</div>
          <div class="flames">${'<div class="flame"></div>'.repeat(1+S.engineLvl)}</div>
        </div>
        <div class="powerbar">⚡ Reactor load <b class="${st.powerUse>st.powerOut?"low":""}">${st.powerUse}/${st.powerOut}</b>
          <span class="dim">(drive core ${4+2*S.engineLvl}${st.intact("reactor")?" + aux "+st.intact("reactor")*3:""})</span>
          <div class="cells">${Array.from({length:st.powerOut},(_,i)=>`<div class="cell ${i<st.powerUse?"used":""}"></div>`).join("")}</div>
        </div>
        <p class="dim" style="margin-top:8px">● green = running · ○ grey = powered down · ⛔ red = damaged. Click a bay to inspect, toggle power, or sell.</p>
      </div>
      ${selHtml}
      <div class="panel"><h3>Ship Systems</h3>
        <div class="statgrid">
          <span>Cargo</span><b>${cargoUsed()}/${st.cargoCap}</b>
          <span>Hidden cargo</span><b>${scargoUsed()}/${st.scargoCap}</b>
          <span>Passenger berths</span><b>${paxJobs().length}/${st.paxCap}</b>
          <span>Staterooms</span><b>${vipJobs().length}/${st.vipCap}</b>
          <span>Crew bunks</span><b>${S.crew.length}/${st.crewCap}</b>
          <span>Combat damage</span><b>~${st.dmg}</b>
          <span>Shields</span><b>−${st.shield}/hit</b>
          <span>Speed</span><b>${st.speed} u/day</b>
          <span>Fuel burn</span><b>${st.fuelDay}/day</b>
          <span>Food: eat/grow</span><b>${foodPerDay()}/${st.foodGen}</b>
          <span>Trade goods</span><b>${S.cargo.ore} ore · ${S.cargo.med} med · ${S.cargo.lux} lux</b>
          <span>Payroll</span><b>${salaries()}cr/day</b>
          <span>Reactor</span><b>${st.powerUse}/${st.powerOut}⚡</b>
          <span>Systems down</span><b class="${S.modules.some(m=>m.dmg)?"low":""}">${S.modules.filter(m=>m.dmg).length}</b>
        </div>
      </div>
      <div class="panel"><h3>Faction Standing</h3>${repHtml}</div>
    </div>
    <div class="col">
      <div class="panel"><h3>Active Contracts (${S.jobs.length})</h3>${jobsHtml}</div>
      <div class="panel"><h3>Crew (${S.crew.length}/${st.crewCap})</h3>${crewHtml}</div>
      <div class="panel"><h3>Passengers</h3>${paxHtml}</div>
    </div>
  </div>`;
}
function selSlot(i){ S.sel = (S.sel===i? null : i); render(); }

// ---- map screen ----
function mapHTML(){
  const st = stats();
  let svg = `<svg id="mapsvg" viewBox="0 0 860 480" xmlns="http://www.w3.org/2000/svg">`;
  // stars
  for(let i=0;i<70;i++){
    const x=(i*137)%860, y=(i*211)%480;
    svg += `<circle cx="${x}" cy="${y}" r="${i%7===0?1.3:0.7}" fill="#ffffff${i%3===0?"66":"33"}"/>`;
  }
  const from = S.travel ? S.travel.from : S.loc;
  // route line to selection
  if(S.selPlanet && S.selPlanet!==from){
    const A=PLANETS[from], B=PLANETS[S.selPlanet];
    svg += `<line x1="${A.x}" y1="${A.y}" x2="${B.x}" y2="${B.y}" stroke="#e8b04b88" stroke-dasharray="6 5" stroke-width="1.5"/>`;
  }
  for(const k in PLANETS){
    const p = PLANETS[k];
    if(p.hidden && S.arc.stage<5) continue;
    const cur = k===S.loc && S.docked;
    const c = FACS[p.fac].c;
    svg += `<g class="planet-dot" onclick="selPlanet('${k}')">
      <circle cx="${p.x}" cy="${p.y}" r="11" fill="${c}" stroke="${k===S.selPlanet?"#e8b04b":"#000"}" stroke-width="${k===S.selPlanet?3:1}"/>
      ${cur?`<circle cx="${p.x}" cy="${p.y}" r="17" fill="none" stroke="#e8b04b" stroke-width="1.5" stroke-dasharray="3 3"/>`:""}
      <text x="${p.x}" y="${p.y+28}" fill="#c9cdd8" font-size="12" text-anchor="middle">${p.n}</text>
      ${k==="gate"?`<text x="${p.x}" y="${p.y-18}" fill="#e8b04b" font-size="11" text-anchor="middle">◆ THE RUN</text>`:""}
    </g>`;
  }
  if(S.travel){
    const A=PLANETS[S.travel.from], B=PLANETS[S.travel.dest];
    const t = 1 - S.travel.left/S.travel.total;
    const x = A.x+(B.x-A.x)*t, y = A.y+(B.y-A.y)*t;
    svg += `<line x1="${A.x}" y1="${A.y}" x2="${B.x}" y2="${B.y}" stroke="#e8b04b55" stroke-width="1"/>
      <text x="${x}" y="${y}" font-size="16" text-anchor="middle" fill="#e8b04b">☄</text>`;
  }
  svg += `</svg>`;
  let info = "";
  if(S.selPlanet){
    const p = PLANETS[S.selPlanet];
    if(S.selPlanet===from){
      info = `<div class="panel"><h3>${p.n}</h3><p class="dim">${p.d}</p><p class="dim">You're here.</p></div>`;
    } else {
      const d = daysTo(from, S.selPlanet), f = fuelTo(from, S.selPlanet);
      const foodNeed = foodPerDay()*d;
      const ok = S.fuel>=f;
      info = `<div class="panel"><h3>${p.n} <span class="badge fac">${FACS[p.fac].n}</span></h3>
        <p class="dim">${p.d}</p>
        <div class="statgrid" style="margin:8px 0">
          <span>Distance</span><b>${d} days</b>
          <span>Fuel needed</span><b class="${ok?"":"low"}">${f} (have ${Math.floor(S.fuel)})</b>
          <span>Food needed (est.)</span><b class="${S.food>=foodNeed?"":"low"}">~${foodNeed} (have ${Math.floor(S.food)})</b>
          <span>Fuel price there</span><b>${p.fuelP||"—"}cr</b>
        </div>
        ${S.docked ? `<button class="primary" ${ok?"":"disabled"} onclick="depart('${S.selPlanet}')">${ok?"⛽ Depart ("+f+" fuel, "+d+" days)":"Not enough fuel"}</button>` : `<span class="dim">Already in transit.</span>`}
      </div>`;
    }
  } else {
    info = `<div class="panel"><p class="dim">Select a destination. Planet colors show controlling faction: <span style="color:#5b8dd9">Union</span> · <span style="color:#d9a55b">Frontier</span> · <span style="color:#d96b6b">Syndicate</span>.</p></div>`;
  }
  return `<div class="panel"><h3>Sector Chart</h3>${svg}</div>` + info;
}
function selPlanet(k){ S.selPlanet = k; render(); }

// ---- planet screen ----
function planetHTML(){
  refreshMarket();
  const p = PLANETS[S.loc];
  const tab = (id,label)=>`<button class="${S.ptab===id?"tab-on":""}" onclick="ptab('${id}')">${label}</button>`;
  let body = "";
  if(S.ptab==="cantina") body = cantinaHTML();
  else if(S.ptab==="market") body = marketHTML();
  else body = yardHTML();
  return `<div class="panel">
    <h3>${p.n} — ${p.tag} <span class="badge fac">${FACS[p.fac].n}</span></h3>
    <p class="dim" style="margin-bottom:10px">${p.d}</p>
    <div style="display:flex; gap:6px; flex-wrap:wrap">
      ${tab("cantina","🍺 Cantina")} ${tab("market","⚖ Market")} ${tab("yard","🔧 Shipyard")}
      <button onclick="waitDay()" title="Pass a day: refreshes jobs & prices, consumes food & payroll">⏳ Wait a day</button>
    </div>
  </div>` + body;
}
function ptab(t){ S.ptab = t; render(); }

function cantinaHTML(){
  const M = S.market;
  const arcCard = arcCantinaCard();
  const missions = M.missions.length ? M.missions.map((m,i)=>{
    const [ok] = canAccept(m);
    return `<div class="card">
      <div class="title">${m.title} <span class="dim">→ ${PLANETS[m.dest].n} (${daysTo(S.loc,m.dest)}d)</span></div>
      <div class="dim">${m.desc}</div>
      <div>${needBadges(m)} <span class="badge fac">${FACS[m.rep[0]].n} +${m.rep[1]}</span>${m.prestige?`<span class="badge">+${m.prestige}★</span>`:""}</div>
      <div style="margin-top:6px; display:flex; justify-content:space-between; align-items:center">
        <span class="pay">${fmt(m.pay)}cr${m.deadline?` <span class="dim">· by day ${m.deadline}</span>`:""}</span>
        <button ${ok?"":"disabled"} onclick="acceptMission(${i})">${ok?"Accept":"Can't take"}</button>
      </div></div>`;
  }).join("") : `<div class="dim">The job board is picked clean. Wait a day or fly on.</div>`;
  const recruits = M.recruits.length ? M.recruits.map((r,i)=>
    `<div class="card"><div class="title">${r.name} <span class="dim">— ${ROLES[r.role].n}</span></div>
     <div class="dim">${ROLES[r.role].d}</div>
     <div style="margin-top:6px; display:flex; justify-content:space-between; align-items:center">
       <span class="dim">Fee ${r.fee}cr · salary ${r.salary}cr/day</span>
       <button onclick="hire(${i})">Hire</button>
     </div></div>`).join("") : `<div class="dim">Nobody worth hiring tonight — just regulars and bad decisions.</div>`;
  const rumors = M.rumors.map(r=>`<div class="card"><div class="dim" style="font-style:italic">${r}</div></div>`).join("");
  return `<div class="row">
    <div class="col">
      ${arcCard ? `<div class="panel"><h3>◆ The Grey Coat</h3>${arcCard}</div>` : ""}
      <div class="panel"><h3>Job Board</h3>${missions}</div>
    </div>
    <div class="col">
      <div class="panel"><h3>Hands for Hire <span class="dim">(bunks: ${S.crew.length}/${stats().crewCap})</span></h3>${recruits}</div>
      <div class="panel"><h3>Overheard at the Bar</h3>${rumors}</div>
    </div>
  </div>`;
}

function marketHTML(){
  const M = S.market, p = PLANETS[S.loc];
  const rows = Object.keys(GOODS).map(g=>{
    const buy = M.prices[g], sell = Math.round(buy*0.92);
    return `<tr><td>${GOODS[g].n}</td><td>${buy}cr</td><td>${sell}cr</td><td>${S.cargo[g]}</td>
      <td>
        <button onclick="buyGood('${g}',1)">+1</button> <button onclick="buyGood('${g}',10)">+10</button>
        <button onclick="sellGood('${g}',1)">−1</button> <button onclick="sellGood('${g}',10)">−10</button>
      </td></tr>`;
  }).join("");
  return `<div class="row"><div class="col">
    <div class="panel"><h3>Commodities <span class="dim">(cargo ${cargoUsed()}/${stats().cargoCap})</span></h3>
      <table><tr><th>Good</th><th>Buy</th><th>Sell</th><th>Held</th><th></th></tr>${rows}</table>
      <p class="dim" style="margin-top:8px">Prices vary by world and drift daily. Buy where they make it, sell where they can't.</p>
    </div></div>
    <div class="col"><div class="panel"><h3>Provisions</h3>
      <div class="card"><div class="title">⛽ Fuel — ${p.fuelP}cr/unit <span class="dim">(${Math.floor(S.fuel)}/${stats().fuelCap})</span></div>
        <div style="margin-top:6px"><button onclick="buyFuel(10)">+10</button> <button onclick="buyFuel(999)">Fill tanks (${Math.ceil((stats().fuelCap-S.fuel))*p.fuelP}cr)</button></div></div>
      <div class="card"><div class="title">🍞 Food — ${p.foodP}cr/unit <span class="dim">(${Math.floor(S.food)} held, eating ${foodPerDay()}/day)</span></div>
        <div style="margin-top:6px"><button onclick="buyFood(10)">+10</button> <button onclick="buyFood(30)">+30</button></div></div>
    </div></div></div>`;
}

function yardHTML(){
  const st = stats();
  const p = PLANETS[S.loc];
  const nonCore = modInst().length;
  const dmgd = S.modules.filter(m=>m.dmg);
  const modsHtml = Object.keys(MODS).filter(t=>!MODS[t].core).map(t=>{
    const m = MODS[t];
    const price = yardPrice(t);
    const owned = st.inst(t);
    const pwr = m.pw ? ` <span class="badge">⚡ draws ${m.pw}</span>` : m.gen ? ` <span class="badge ok">⚡ +${m.gen}</span>` : ` <span class="badge">passive</span>`;
    return `<div class="card"><div class="title">${m.icon} ${m.n} ${owned?`<span class="dim">(own ${owned})</span>`:""}</div>
      <div class="dim">${m.d}</div>
      <div>${pwr}</div>
      <div style="margin-top:6px; display:flex; justify-content:space-between; align-items:center">
        <span class="pay">${price}cr</span>
        <button ${S.credits>=price && nonCore<S.slotsMax ? "" : "disabled"} onclick="buyMod('${t}')">Install</button>
      </div></div>`;
  }).join("");
  const engCost = S.engineLvl===1?500:1100;
  const slotCost = S.slotsMax===6?600:1200;
  return `<div class="row">
    <div class="col"><div class="panel"><h3>Module Shop ${p.yard?'<span class="badge ok">15% off</span>':""} <span class="dim">(slots ${nonCore}/${S.slotsMax})</span></h3>
      ${nonCore>=S.slotsMax?'<p class="low" style="margin-bottom:8px">Ship is full — sell a module (Ship screen) or buy a hull expansion.</p>':""}
      ${modsHtml}</div></div>
    <div class="col">
      <div class="panel"><h3>Dry Dock</h3>
        <div class="card"><div class="title">🛠 Hull repair — 4cr/point <span class="dim">(${Math.round(S.hull)}/${S.hullMax})</span></div>
          <div style="margin-top:6px"><button ${S.hull<S.hullMax?"":"disabled"} onclick="repairShip()">Repair all (${(S.hullMax-Math.round(S.hull))*4}cr)</button></div></div>
        <div class="card"><div class="title">⚡ System repairs — 80cr/module ${dmgd.length?`<span class="low">(${dmgd.length} damaged)</span>`:'<span class="dim">(all systems nominal)</span>'}</div>
          ${dmgd.length?`<div class="dim">${dmgd.map(m=>MODS[m.t].n).join(", ")}</div>`:""}
          <div style="margin-top:6px"><button ${dmgd.length?"":"disabled"} onclick="repairSystems()">Restore all systems (${dmgd.length*80}cr)</button></div></div>
        <div class="card"><div class="title">🔥 Drive Core — Mk-${["","I","II","III"][S.engineLvl]}</div>
          <div class="dim">Faster travel: fewer days means less fuel, less food, fewer chances for trouble. Helps you flee, and each mark adds +2 reactor power.</div>
          <div style="margin-top:6px"><button ${S.engineLvl<3 && S.credits>=engCost ? "" : "disabled"} onclick="upgradeEngine()">${S.engineLvl<3?`Upgrade to Mk-${["","","II","III"][S.engineLvl+1]} (${engCost}cr)`:"Maxed out"}</button></div></div>
        <div class="card"><div class="title">🧱 Hull expansion — +2 module slots <span class="dim">(${S.slotsMax}/10)</span></div>
          <div style="margin-top:6px"><button ${S.slotsMax<10 && S.credits>=slotCost ? "" : "disabled"} onclick="buySlots()">${S.slotsMax<10?`Expand (${slotCost}cr)`:"Fully expanded"}</button></div></div>
        <p class="dim">Sell installed modules from the Ship screen (60% of list).</p>
      </div>
    </div></div>`;
}

// ---- travel screen ----
function travelHTML(){
  if(!S.travel) return `<div class="panel"><p class="dim">You're docked.</p></div>`;
  const t = S.travel;
  const pct = Math.round((1 - t.left/t.total)*100);
  const st = stats();
  const run = S.arc.stage===5 && S.arc.deadline;
  return `<div class="panel">
    <h3>In Transit: ${PLANETS[t.from].n} → ${PLANETS[t.dest].n}</h3>
    <p>Day ${t.total-t.left} of ${t.total} · ${t.left} day${t.left===1?"":"s"} remaining</p>
    <div class="starfield"><div class="l2"></div><div class="l1"></div><div class="tinyship">🚀</div></div>
    <div class="progress"><div class="fill" style="width:${pct}%"></div></div>
    <div class="statgrid" style="margin:10px 0">
      <span>Fuel</span><b class="${S.fuel<st.fuelDay*t.left?"low":""}">${S.fuel.toFixed(1)} (burning ${st.fuelDay}/day)</b>
      <span>Food</span><b class="${S.food<foodPerDay()*t.left?"low":""}">${Math.floor(S.food)} (eating ${foodPerDay()}/day)</b>
      <span>Hull</span><b class="${S.hull<40?"low":""}">${Math.round(S.hull)}/${S.hullMax}</b>
      <span>Souls aboard</span><b>${people()}</b>
      <span>Reactor</span><b>${st.powerUse}/${st.powerOut}⚡</b>
      <span>Systems down</span><b class="${S.modules.some(m=>m.dmg)?"low":""}">${S.modules.filter(m=>m.dmg).map(m=>MODS[m.t].n).join(", ")||"none"}</b>
    </div>
    ${run?`<p class="low">◆ THE RUN — reach Elysium Gate by day ${S.arc.deadline}. It is day ${S.day}.</p>`:""}
    <button class="primary" style="font-size:16px; padding:10px 24px" onclick="advanceDay()">▸ Advance one day</button>
    <p class="dim" style="margin-top:10px">Each day burns fuel and food, pays salaries, and rolls the dice on what the black throws at you.</p>
  </div>`;
}

// ---- side log ----
function renderSide(){
  $("side").innerHTML = `<div class="panel"><h3>Captain's Log</h3>
    ${S.logLines.map(l=>`<div class="logline"><b>D${l.d}</b> ${l.m}</div>`).join("") || '<div class="dim">Nothing yet.</div>'}
  </div>`;
}

// ============================================================
// HELP / NEW GAME / INIT
// ============================================================
function showHelp(){
  modal(`<h2>How to Fly</h2>
    <p><b>Goal:</b> keep the ship fueled, fed, and flying. Take contracts from cantinas, haul goods between worlds, buy modules, hire crew — and when your prestige reaches <b>12★</b>, a woman in a grey coat will find you. That's when the real story starts.</p>
    <p><b>Loop:</b> dock → cantina for jobs → market for fuel/food/trade → shipyard for modules & repairs → star map → depart → advance days, survive events → deliver → profit.</p>
    <p><b>Modules</b> define what jobs you can take: cabins for passengers, med bay for medical runs, weapons + armory for bounties, smuggler's hold for the shady stuff, hydroponics to grow food. Slots are limited — choices matter.</p>
    <p><b>Power:</b> active systems (⚡ pips on the deck plan) draw reactor power; the drive core only makes so much. Toggle modules on/off from the Ship screen, upgrade the drive (+2⚡ per mark), or fit an Auxiliary Reactor (+3⚡). <b>Damage:</b> combat hits and breakdowns knock specific modules offline — red LED, lost capability, sometimes vented fuel or jettisoned cargo. Fix them at a dry dock (80cr) or let a mechanic jury-rig them mid-flight.</p>
    <p><b>Crew</b> delegate the work: a mechanic repairs in flight, a pilot saves fuel and dodges trouble, a cook stretches rations, a gunner hits harder, a quartermaster squeezes contracts. They need quarters, salaries, and food.</p>
    <p><b>Economy tips:</b> food is dirt-cheap on Kestrel's Rest; modules are 15% off at Foundry; goods bought at their source world sell high on the frontier. Medicine from Meridian → Verge is a classic.</p>
    <p><b>Don't:</b> run out of fuel mid-flight (ruinous tow fees), run out of food (crew starve and quit), skip payroll, or fly weaponless through pirate country with full holds.</p>
    <p><b>The Run:</b> the endgame is a timed dash against the Union net — Oregon Trail rules. Provision like your life depends on it. It does.</p>
    <div class="choices"><button class="primary" onclick="closeModal()">Back to the black</button></div>`);
}
function confirmNewGame(){
  modal(`<h2>Abandon ship?</h2><p>This scuttles the current save and starts over.</p>
    <div class="choices">
      <button class="danger" onclick="newGame()">Yes — new game</button>
      <button onclick="closeModal()">Keep flying</button>
    </div>`);
}
function newGame(){
  try{ localStorage.removeItem("kestrelrun"); }catch(e){}
  MODAL_HTML = null; drawModal();
  intro();
}
function intro(){
  modal(`<h2>☄ THE KESTREL RUN</h2>
    <p>The war's over, the Union won, and the paperwork never stops. You've got a secondhand freighter, <b>500 credits</b>, half a tank of fuel, and a registry that's <i>technically</i> clean.</p>
    <p>Out here past the core worlds, folk need things moved — cargo, passengers, secrets. Your ship is a spine with room to grow: bolt on cabins, cargo, guns, or a hydroponics bay full of beans. You can't have everything. That's the job: choosing.</p>
    <p>Earn credits. Earn a reputation. And when your name means something (<b>12★ prestige</b>), somebody with a very dangerous crate is going to come looking for a captain exactly like you.</p>
    <p style="margin-bottom:4px"><b>Name your ship:</b></p>
    <input id="shipnamein" value="Kestrel" maxlength="18" style="width:100%; padding:8px; background:#0d0f17; border:1px solid var(--line); color:var(--amber); border-radius:4px; font-size:15px; font-family:inherit">
    <div class="choices">
      <button class="primary" onclick="startGame()">Take the keys</button>
    </div>`);
}
function startGame(){
  const name = ($("shipnamein") && $("shipnamein").value.trim()) || "Kestrel";
  S = newState(name);
  MODAL_HTML = null; drawModal();
  log(`You take possession of the ${name} at Port Solace. She's ugly, slow, and yours.`);
  log("Tip: hit the Cantina for work, the Market for fuel & food, the Shipyard for modules. ? Help has the full manual.");
  refreshMarket();
  render();
}

// ---- boot ----
function migrate(s){
  // v1 saves stored modules as plain type strings
  if(s.modules && s.modules.length && typeof s.modules[0]==="string"){
    s.modules = s.modules.map(t => ({t:t, on:true, dmg:false}));
  }
  (s.modules||[]).forEach(m => { if(m.on===undefined) m.on=true; if(m.dmg===undefined) m.dmg=false; });
  return s;
}
(function boot(){
  let saved = null;
  try{ saved = localStorage.getItem("kestrelrun"); }catch(e){}
  if(saved){
    try{
      S = migrate(JSON.parse(saved));
      render();
      log("— Session restored. Welcome back, Captain. —");
      render();
      return;
    }catch(e){ /* corrupted save */ }
  }
  intro();
})();
</script>

</html>
