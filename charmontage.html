<!doctype html>
<html>
<head><meta charset="utf-8"><title>Character Sheet</title>
<style>
  html,body{margin:0;background:#080a10;overflow:hidden;font-family:Consolas,monospace}
  #c{position:fixed;inset:0;width:100vw;height:100vh;display:block}
  #labels{position:fixed;inset:0;display:grid;grid-template-columns:repeat(6,1fr);grid-template-rows:repeat(3,1fr);pointer-events:none}
  .cell{position:relative;border:1px solid #141a2688}
  .lbl{position:absolute;left:5px;top:4px;font-size:12px;color:#cfe0f7;text-shadow:0 1px 3px #000}
  .row{position:absolute;right:6px;top:4px;font-size:11px;color:#e8b04b;text-shadow:0 1px 3px #000}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="labels"></div>
<script type="module">
import * as THREE from "three";
import { buildCharacter, poseCharacter } from "/src/ui/character3d.ts";
import { HEADS, GARBS } from "/src/ui/avatarDraw.ts";

const TRIMS = ["#e8b04b","#5aa7ff","#6fbf73","#d96b6b","#b98bd9","#7ad0c0"];
const SUITS = ["#2a3346","#1c2b3a","#243026","#3a2530","#2e2740","#243a3a"];
const SKINS = ["#e2b48c","#8fbf7a","#7ab0c9","#c98f8f","#b0a8c9","#cfc07a"];
const COLS = 6, ROWS = 3;

const canvas = document.getElementById("c");
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, preserveDrawingBuffer: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.7;
renderer.setClearColor(0x080a10, 1);
renderer.autoClear = false;

const scene = new THREE.Scene();
scene.add(new THREE.HemisphereLight(0xbcd4ff, 0x232a3a, 1.1));
const key = new THREE.DirectionalLight(0xffe8c8, 2.3); key.position.set(-1.6, 2.4, 2.2); scene.add(key);
const rim = new THREE.DirectionalLight(0x5aa7ff, 1.5); rim.position.set(1.2, 1.6, -2.4); scene.add(rim);
const fill = new THREE.DirectionalLight(0x8fb8e8, .55); fill.position.set(1.8, .6, 1.6); scene.add(fill);

const labels = document.getElementById("labels");
const cells = [];
let idx = 0;
for (let gi = 0; gi < ROWS; gi++) {
  for (let hi = 0; hi < COLS; hi++) {
    const cell = document.createElement("div"); cell.className = "cell";
    const l = document.createElement("div"); l.className = "lbl"; l.textContent = HEADS[hi].name; cell.appendChild(l);
    const r = document.createElement("div"); r.className = "row"; r.textContent = GARBS[gi].name; cell.appendChild(r);
    labels.appendChild(cell);

    const px = idx * 6; // spread rigs far apart in world so viewports don't see neighbours
    const rig = buildCharacter({
      head: HEADS[hi].id, garb: GARBS[gi].id,
      frame: hi % 3 === 0 ? "neutral" : hi % 3 === 1 ? "masculine" : "feminine",
      skin: SKINS[hi], suit: SUITS[hi], trim: TRIMS[hi],
    });
    rig.group.position.x = px; rig.group.rotation.y = -0.35;
    scene.add(rig.group);
    const cam = new THREE.PerspectiveCamera(30, 1, .1, 30);
    cells.push({ rig, cam, px, col: hi, row: gi });
    idx++;
  }
}

function resize() {
  renderer.setSize(innerWidth, innerHeight, false);
}
addEventListener("resize", resize); resize();

function frame(t) {
  renderer.clear();
  const cw = innerWidth / COLS, ch = innerHeight / ROWS;
  for (const c of cells) {
    poseCharacter(c.rig, { t });
    const x = c.col * cw, y = innerHeight - (c.row + 1) * ch; // GL y is bottom-up
    renderer.setViewport(x, y, cw, ch);
    renderer.setScissor(x, y, cw, ch);
    renderer.setScissorTest(true);
    c.cam.aspect = cw / ch;
    if (location.hash === "#heads") { c.cam.position.set(c.px, 1.42, 1.15); c.cam.lookAt(c.px, 1.4, 0); }
    else { c.cam.position.set(c.px, .95, 2.9); c.cam.lookAt(c.px, .82, 0); }
    c.cam.updateProjectionMatrix();
    renderer.render(scene, c.cam);
  }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
window.__ready = true;
</script>
</body>
</html>
