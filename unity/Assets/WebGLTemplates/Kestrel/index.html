<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>The Kestrel Run - Unity</title>
  <style>
    html, body, #unity-container, #unity-canvas {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #111417;
    }
    #unity-canvas {
      display: block;
    }
    #dev-monitor {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 10;
      width: 260px;
      padding: 10px;
      color: #dcebf0;
      background: rgba(10, 15, 18, 0.88);
      border: 1px solid #55727d;
      border-radius: 6px;
      font: 12px/1.35 monospace;
    }
    #dev-monitor button {
      margin-bottom: 7px;
      padding: 5px 9px;
      color: #e8f4f7;
      background: #244b5a;
      border: 1px solid #79aabb;
      border-radius: 3px;
      cursor: pointer;
    }
    #view-controls, #captain-controls, #bay-controls {
      display: flex;
      gap: 5px;
      margin-bottom: 7px;
    }
    #view-controls button, #captain-controls button, #bay-controls button {
      flex: 1;
      padding: 4px;
      font-size: 11px;
    }
    #bay-controls {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
    }
    #captain-controls {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
    }
    #acceptance-status {
      margin: 0;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div id="unity-container">
    <canvas id="unity-canvas" tabindex="-1"></canvas>
  </div>
  <aside id="dev-monitor" aria-label="Unity development monitor">
    <button id="run-acceptance" type="button">Run acceptance</button>
    <button id="open-captain-picker" type="button">Captain setup</button>
    <button id="run-lane-event" type="button">Tinker encounter</button>
    <div id="view-controls" aria-label="Ship inspection views">
      <button id="view-cockpit" type="button">Cockpit</button>
      <button id="view-midship" type="button">Midship</button>
      <button id="view-engine" type="button">Engine</button>
    </div>
    <div id="captain-controls" aria-label="Captain models">
      <button type="button" data-model="explorer">Man</button>
      <button type="button" data-model="female-explorer">Woman</button>
      <button type="button" data-model="alien-explorer">Frog</button>
    </div>
    <div id="bay-controls" aria-label="Module bay inspection views">
      <button type="button" data-slot="0">Bay 0</button>
      <button type="button" data-slot="1">Bay 1</button>
      <button type="button" data-slot="2">Bay 2</button>
      <button type="button" data-slot="3">Bay 3</button>
      <button type="button" data-slot="4">Bay 4</button>
      <button type="button" data-slot="5">Bay 5</button>
    </div>
    <pre id="acceptance-status">Loading Unity...</pre>
  </aside>
  <script src="Build/{{{ LOADER_FILENAME }}}"></script>
  <script>
    const canvas = document.querySelector("#unity-canvas");
    const acceptanceStatus = document.querySelector("#acceptance-status");
    const setAcceptanceStatus = (text) => {
      acceptanceStatus.textContent = text;
      acceptanceStatus.dataset.updatedAt = new Date().toISOString();
    };
    window.kestrel = {
      ready: false,
      lastState: "{}",
      command(action, args = {}) {
        const payload = JSON.stringify({ action, ...args });
        window.kestrel.unityInstance.SendMessage("KestrelBridge", "Command", payload);
      },
      state() {
        try {
          return JSON.parse(window.kestrel.lastState || "{}");
        } catch {
          return {};
        }
      },
      capture() {
        const dataUrl = canvas.toDataURL("image/png");
        window.kestrel.lastCapture = dataUrl;
        return dataUrl;
      },
      async waitForState(predicate, timeoutMs = 5000) {
        const started = performance.now();
        while (performance.now() - started < timeoutMs) {
          const state = window.kestrel.state();
          if (predicate(state)) return state;
          await new Promise((resolve) => setTimeout(resolve, 50));
        }
        throw new Error("Timed out waiting for Unity state.");
      },
      async runAcceptance() {
        const checks = [];
        const check = (name, pass, detail = "") => {
          checks.push({ name, pass: Boolean(pass), detail });
          if (!pass) throw new Error(`${name}: ${detail}`);
        };
        try {
          setAcceptanceStatus("Running acceptance...");
          await window.kestrel.waitForState(() => window.kestrel.ready === true, 15000);
          window.kestrel.command("loadScenario", { scenario: "fresh", seed: 8919 });
          let state = await window.kestrel.waitForState((next) => next.scenario === "fresh" && next.seed === 8919);
          check("fresh scenario", state.ship.bayCount === 6, `bayCount=${state.ship?.bayCount}`);
          check("authored module state", state.ship.modules.length === 5, `modules=${state.ship?.modules?.length}`);

          const beforeA = state.ship.modules.find((module) => module.slot === 1)?.key;
          const beforeB = state.ship.modules.find((module) => module.slot === 2)?.key;
          window.kestrel.command("swapModules", { slotA: 1, slotB: 2 });
          state = await window.kestrel.waitForState((next) => next.ship.modules.find((module) => module.slot === 1)?.key === beforeB);
          check("module swap", state.ship.modules.find((module) => module.slot === 2)?.key === beforeA);

          window.kestrel.command("setCaptainModel", { model: "alien-explorer" });
          await window.kestrel.waitForState((next) => next.appearance?.model === "alien-explorer");
          window.kestrel.command("save");
          window.kestrel.command("swapModules", { slotA: 1, slotB: 2 });
          await window.kestrel.waitForState((next) => next.ship.modules.find((module) => module.slot === 1)?.key === beforeA);
          window.kestrel.command("setCaptainModel", { model: "explorer" });
          await window.kestrel.waitForState((next) => next.appearance?.model === "explorer");
          window.kestrel.command("load");
          state = await window.kestrel.waitForState((next) =>
            next.ship.modules.find((module) => module.slot === 1)?.key === beforeB &&
            next.appearance?.model === "alien-explorer");
          check("save/load", state.ship.modules.find((module) => module.slot === 2)?.key === beforeA);
          check("captain selection", state.appearance.model === "alien-explorer");

          window.kestrel.command("runLaneEventDemo");
          state = await window.kestrel.waitForState((next) => next.laneEvent?.key === "tinker-trader");
          check("lane event selection", state.seed === 33 && state.rngState === -1143365213,
            `seed=${state.seed}, rngState=${state.rngState}`);
          window.kestrel.command("resolveLaneEvent", { choice: "buy-food" });
          state = await window.kestrel.waitForState((next) => next.laneEvent === null && next.credits === 470 && next.food === 28);
          check("lane event choice", state.travel?.left === 1, `credits=${state.credits}, food=${state.food}`);
          window.kestrel.command("save");
          window.kestrel.command("loadScenario", { scenario: "trader", seed: 8919 });
          await window.kestrel.waitForState((next) => next.scenario === "trader");
          window.kestrel.command("load");
          state = await window.kestrel.waitForState((next) => next.scenario === "fresh" && next.seed === 33 && next.food === 28);
          check("lane event save/load", state.credits === 470 && state.laneEvent === null);

          window.kestrel.command("loadScenario", { scenario: "fresh", seed: 8919 });
          await window.kestrel.waitForState((next) => next.scenario === "fresh" && next.seed === 8919);
          window.kestrel.command("runTransferLoop");
          state = await window.kestrel.waitForState((next) => next.location === "foundry" && next.docked === true);
          check("contract travel loop", state.credits === 740 && state.prestige === 1, `credits=${state.credits}, prestige=${state.prestige}`);

          window.kestrel.command("loadScenario", { scenario: "trader", seed: 8919 });
          await window.kestrel.waitForState((next) => next.scenario === "trader" && next.day === 14);
          window.kestrel.command("waitDay");
          state = await window.kestrel.waitForState((next) => next.scenario === "trader" && next.day === 15);
          check("day upkeep", state.food === 25 && state.credits === 1784 && state.starve === 0 && state.unpaid === 0,
            `food=${state.food}, credits=${state.credits}, starve=${state.starve}, unpaid=${state.unpaid}`);

          window.kestrel.command("loadScenario", { scenario: "fresh", seed: 8919 });
          state = await window.kestrel.waitForState((next) => next.scenario === "fresh" && next.day === 1);
          const capture = window.kestrel.capture();
          check("nonblank capture", capture.length > 10000, `capture length=${capture.length}`);
          const result = { pass: true, checks, state, capture };
          setAcceptanceStatus(`PASS · ${checks.length}/${checks.length} checks\n${checks.map((item) => `✓ ${item.name}`).join("\n")}`);
          return window.kestrel.lastAcceptance = result;
        } catch (error) {
          const result = { pass: false, checks, error: String(error), state: window.kestrel.state() };
          setAcceptanceStatus(`FAIL · ${checks.length} checks completed\n${String(error)}`);
          return window.kestrel.lastAcceptance = result;
        }
      }
    };

    document.querySelector("#run-acceptance").addEventListener("click", () => {
      window.kestrel.runAcceptance();
    });
    document.querySelector("#open-captain-picker").addEventListener("click", () => window.kestrel.command("openCaptainPicker"));
    document.querySelector("#run-lane-event").addEventListener("click", () => window.kestrel.command("runLaneEventDemo"));
    document.querySelector("#view-cockpit").addEventListener("click", () => window.kestrel.command("movePlayerToCockpit"));
    document.querySelector("#view-midship").addEventListener("click", () => window.kestrel.command("movePlayerToMidship"));
    document.querySelector("#view-engine").addEventListener("click", () => window.kestrel.command("movePlayerToEngine"));
    document.querySelectorAll("#captain-controls [data-model]").forEach((button) => {
      button.addEventListener("click", () => window.kestrel.command("setCaptainModel", { model: button.dataset.model }));
    });
    document.querySelectorAll("#bay-controls [data-slot]").forEach((button) => {
      button.addEventListener("click", () => window.kestrel.command("movePlayerToSlot", { slot: Number(button.dataset.slot) }));
    });

    createUnityInstance(canvas, {
      dataUrl: "Build/{{{ DATA_FILENAME }}}",
      frameworkUrl: "Build/{{{ FRAMEWORK_FILENAME }}}",
      codeUrl: "Build/{{{ CODE_FILENAME }}}",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "Kestrel",
      productName: "The Kestrel Run",
      productVersion: "0.1.0"
    }).then((unityInstance) => {
      window.kestrel.unityInstance = unityInstance;
      setAcceptanceStatus("Unity loaded · bridge starting...");
    });
  </script>
</body>
</html>
